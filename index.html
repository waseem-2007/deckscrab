<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<title>Deckscrab — Find Local Businesses Near You</title>
<meta name="description" content="Find local shops, restaurants, doctors and services near you in Tamil Nadu. Order via WhatsApp."/>
<meta name="theme-color" content="#FF4D00"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,500;12..96,700;12..96,800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
/* reset.css */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; overflow-x: hidden; -webkit-text-size-adjust: 100%; }
body { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
button, input, select, textarea { font-family: inherit; font-size: inherit; cursor: pointer; outline: none; }
input[type="search"]::-webkit-search-decoration,
input[type="search"]::-webkit-search-cancel-button { -webkit-appearance: none; }
img { max-width: 100%; display: block; }
a { color: inherit; text-decoration: none; }
ul, ol { list-style: none; }
[hidden] { display: none !important; }

/* tokens.css — Design System */
:root {
  /* ── Brand Colors ── */
  --flame:     #FF4D00;
  --flame-2:   #E63E00;
  --flame-soft: rgba(255, 77, 0, 0.1);
  --flame-mid:  rgba(255, 77, 0, 0.18);

  --forest:    #0A7C4A;
  --forest-2:  #085F38;
  --forest-soft: rgba(10, 124, 74, 0.1);

  --ink:       #0C0B09;
  --ink-2:     #2A2825;
  --ink-3:     #5C5851;
  --ink-4:     #9C9790;
  --ink-5:     #C8C4BD;

  --cream:     #F5F2ED;
  --cream-2:   #EDE9E2;
  --cream-3:   #E0DCD4;
  --white:     #FFFFFF;

  --rose:      #C0392B;
  --rose-soft: rgba(192, 57, 43, 0.1);
  --amber:     #D97706;
  --amber-soft: rgba(217, 119, 6, 0.1);
  --blue:      #1A56DB;
  --blue-soft: rgba(26, 86, 219, 0.1);

  /* ── Surfaces ── */
  --surface-0: var(--cream);
  --surface-1: var(--white);
  --surface-2: var(--cream-2);
  --border:    var(--cream-3);
  --border-2:  rgba(12, 11, 9, 0.12);

  /* ── Shadows ── */
  --shadow-sm:  0 1px 4px rgba(12,11,9,.06);
  --shadow-md:  0 4px 16px rgba(12,11,9,.09);
  --shadow-lg:  0 12px 40px rgba(12,11,9,.13);
  --shadow-xl:  0 24px 64px rgba(12,11,9,.18);

  /* ── Typography ── */
  --font-display: 'Bricolage Grotesque', system-ui, sans-serif;
  --font-mono:    'Space Mono', monospace;
  --font-body:    'DM Sans', system-ui, sans-serif;

  /* ── Sizing ── */
  --radius-sm:  8px;
  --radius-md:  14px;
  --radius-lg:  20px;
  --radius-xl:  28px;
  --radius-full: 999px;

  --nav-h:      58px;
  --bnav-h:     68px;

  /* ── Transitions ── */
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-in-out: cubic-bezier(0.4, 0, 0.2, 1);
  --t-fast:  150ms;
  --t-base:  250ms;
  --t-slow:  400ms;
}

/* Dark mode */
@media (prefers-color-scheme: dark) {
  :root {
    --surface-0: #0F0E0C;
    --surface-1: #1A1916;
    --surface-2: #242220;
    --border:    rgba(255,255,255,.08);
    --border-2:  rgba(255,255,255,.14);
    --ink:       #F0EDE8;
    --ink-2:     #D4D0C8;
    --ink-3:     #9E9A92;
    --ink-4:     #6C6860;
    --ink-5:     #3A3830;
    --cream:     #0F0E0C;
    --cream-2:   #1A1916;
    --cream-3:   #242220;
    --shadow-sm: 0 1px 4px rgba(0,0,0,.3);
    --shadow-md: 0 4px 16px rgba(0,0,0,.4);
    --shadow-lg: 0 12px 40px rgba(0,0,0,.5);
  }
}

/* layout.css */
body {
  font-family: var(--font-body);
  background: var(--surface-0);
  color: var(--ink);
  min-height: 100vh;
  overflow-x: hidden;
  padding-bottom: var(--bnav-h);
}

/* ── TOP NAV ── */
.topnav {
  position: sticky;
  top: 0;
  z-index: 100;
  height: var(--nav-h);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  padding-top: env(safe-area-inset-top);
  background: rgba(245, 242, 237, 0.92);
  backdrop-filter: blur(20px) saturate(1.4);
  -webkit-backdrop-filter: blur(20px) saturate(1.4);
  border-bottom: 1px solid var(--border);
}

@media (prefers-color-scheme: dark) {
  .topnav { background: rgba(15, 14, 12, 0.92); }
}

/* Logo */
.logo {
  display: flex;
  align-items: center;
  gap: 8px;
  background: none;
  border: none;
  cursor: pointer;
}
.logo-mark {
  width: 30px;
  height: 30px;
  background: var(--flame);
  color: white;
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 1rem;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  letter-spacing: -0.05em;
  flex-shrink: 0;
}
.logo-text {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 1.15rem;
  color: var(--ink);
  letter-spacing: -0.04em;
}
.logo-live {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--forest);
  box-shadow: 0 0 0 2px var(--forest-soft);
  animation: livePulse 2.4s ease infinite;
  margin-left: 2px;
}
@keyframes livePulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(1.5); }
}

/* Nav right */
.topnav-right {
  display: flex;
  align-items: center;
  gap: 8px;
}
.loc-chip {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 5px 10px;
  background: var(--surface-1);
  border: 1.5px solid var(--border-2);
  border-radius: var(--radius-full);
  font-size: 0.72rem;
  font-weight: 600;
  color: var(--ink-3);
  max-width: 110px;
  overflow: hidden;
}
.loc-chip-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--forest);
  flex-shrink: 0;
}
.loc-chip-text {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.btn-add-shop {
  padding: 6px 14px;
  background: var(--flame);
  color: white;
  border: none;
  border-radius: var(--radius-full);
  font-size: 0.76rem;
  font-weight: 700;
  letter-spacing: -0.01em;
  white-space: nowrap;
  transition: background var(--t-fast);
}
.btn-add-shop:hover { background: var(--flame-2); }

/* ── PAGES ── */
#appRoot {
  width: 100%;
  max-width: 100vw;
}
.page {
  display: none;
  min-height: calc(100vh - var(--nav-h) - var(--bnav-h));
  overflow-x: hidden;
  animation: pageIn var(--t-base) var(--ease-out);
}
.page.active { display: block; }
@keyframes pageIn {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Discover page is special — fills viewport */
#page-discover.active {
  display: flex;
  flex-direction: column;
  height: calc(100vh - var(--nav-h) - var(--bnav-h));
  position: relative;
  overflow: hidden;
}

/* ── BOTTOM NAV ── */
.bottomnav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 100;
  height: var(--bnav-h);
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  background: rgba(245, 242, 237, 0.97);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-top: 1px solid var(--border);
  padding-bottom: env(safe-area-inset-bottom);
}
@media (prefers-color-scheme: dark) {
  .bottomnav { background: rgba(15, 14, 12, 0.97); }
}
.bnav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  background: none;
  border: none;
  padding: 6px 4px;
  position: relative;
  transition: all var(--t-base);
}
.bnav-icon {
  width: 22px;
  height: 22px;
  color: var(--ink-4);
  transition: color var(--t-base), transform var(--t-base);
}
.bnav-label {
  font-size: 0.55rem;
  font-weight: 600;
  color: var(--ink-4);
  letter-spacing: 0.02em;
  transition: color var(--t-base);
}
.bnav-item.active .bnav-icon { color: var(--flame); transform: translateY(-2px); }
.bnav-item.active .bnav-label { color: var(--flame); }
.bnav-item.active::after {
  content: '';
  position: absolute;
  bottom: 2px;
  width: 18px;
  height: 2.5px;
  background: var(--flame);
  border-radius: var(--radius-full);
}

/* FAB button in nav */
.bnav-fab {
  position: relative;
}
.bnav-fab .bnav-icon {
  width: 44px;
  height: 44px;
  background: var(--flame);
  color: white;
  border-radius: 50%;
  padding: 11px;
  margin-top: -14px;
  box-shadow: 0 4px 16px rgba(255, 77, 0, 0.4);
  transition: transform var(--t-base), box-shadow var(--t-base);
}
.bnav-fab:active .bnav-icon { transform: scale(0.94) translateY(-2px); }

/* ── OFFLINE BANNER ── */
.offline-banner {
  position: fixed;
  top: var(--nav-h);
  left: 0;
  right: 0;
  z-index: 200;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 16px;
  background: var(--rose);
  color: white;
  font-size: 0.74rem;
  font-weight: 600;
  justify-content: center;
  animation: slideDown 0.3s var(--ease-out);
}
@keyframes slideDown {
  from { transform: translateY(-100%); }
  to   { transform: translateY(0); }
}
.offline-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: white;
}

/* components.css */

/* ── SEARCH ── */
.search-bar {
  display: flex;
  align-items: center;
  background: var(--surface-1);
  border: 1.5px solid var(--border-2);
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
  transition: border-color var(--t-fast), box-shadow var(--t-fast);
}
.search-bar:focus-within {
  border-color: var(--flame);
  box-shadow: 0 0 0 3px var(--flame-soft);
}
.search-loc-btn {
  padding: 0 14px;
  border: none;
  background: none;
  color: var(--ink-4);
  border-right: 1px solid var(--border);
  height: 48px;
  display: flex;
  align-items: center;
}
.search-input {
  flex: 1;
  padding: 14px;
  border: none;
  background: none;
  font-size: 0.9rem;
  color: var(--ink);
  caret-color: var(--flame);
}
.search-input::placeholder { color: var(--ink-4); }
.search-submit {
  padding: 0 16px;
  border: none;
  background: var(--flame);
  color: white;
  height: 100%;
  display: flex;
  align-items: center;
}

/* Quick chips */
.quick-chips {
  display: flex;
  gap: 7px;
  overflow-x: auto;
  padding: 2px 0 4px;
  scrollbar-width: none;
}
.quick-chips::-webkit-scrollbar { display: none; }
.qchip {
  flex-shrink: 0;
  padding: 6px 13px;
  background: var(--surface-1);
  border: 1.5px solid var(--border-2);
  border-radius: var(--radius-full);
  font-size: 0.74rem;
  font-weight: 600;
  color: var(--ink-2);
  white-space: nowrap;
  transition: all var(--t-fast);
}
.qchip:hover, .qchip:active {
  background: var(--flame-soft);
  border-color: var(--flame);
  color: var(--flame);
}

/* ── SECTION HEADERS ── */
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 16px 10px;
}
.section-label {
  font-family: var(--font-display);
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-3);
}
.see-all-btn {
  background: none;
  border: none;
  font-size: 0.76rem;
  font-weight: 600;
  color: var(--flame);
}

/* ── FEATURED CARDS ── */
.featured-scroll {
  display: flex;
  gap: 12px;
  overflow-x: auto;
  padding: 4px 16px 16px;
  scrollbar-width: none;
}
.featured-scroll::-webkit-scrollbar { display: none; }
.featured-card {
  flex-shrink: 0;
  width: 220px;
  height: 145px;
  border-radius: var(--radius-lg);
  overflow: hidden;
  position: relative;
  cursor: pointer;
  box-shadow: var(--shadow-md);
  transition: transform var(--t-fast), box-shadow var(--t-fast);
}
.featured-card:active { transform: scale(0.97); box-shadow: var(--shadow-sm); }
.feat-bg {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 64px;
  opacity: 0.15;
}
.feat-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(160deg, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0.15) 100%);
}
.feat-body {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 10px 12px;
  background: linear-gradient(to top, rgba(0,0,0,0.75), transparent);
}
.feat-category {
  font-size: 0.6rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.6);
  margin-bottom: 2px;
}
.feat-name {
  font-family: var(--font-display);
  font-size: 0.88rem;
  font-weight: 700;
  color: white;
  margin-bottom: 5px;
  line-height: 1.2;
}
.feat-meta {
  display: flex;
  align-items: center;
  gap: 7px;
  flex-wrap: wrap;
}
.feat-open {
  font-size: 0.62rem;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: var(--radius-full);
  background: rgba(10, 124, 74, 0.3);
  color: #4ade80;
}
.feat-closed {
  font-size: 0.62rem;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: var(--radius-full);
  background: rgba(192,57,43,0.3);
  color: #f87171;
}
.feat-dist { font-size: 0.65rem; color: rgba(255,255,255,0.6); }
.feat-stars { font-size: 0.65rem; color: #fbbf24; margin-left: auto; }

/* ── CATEGORY BAR ── */
.cat-scroll {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding: 8px 16px 12px;
  border-bottom: 1px solid var(--border);
  scrollbar-width: none;
}
.cat-scroll::-webkit-scrollbar { display: none; }
.cat-btn {
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
  background: none;
  border: none;
  cursor: pointer;
  min-width: 56px;
}
.cat-icon-wrap {
  width: 52px;
  height: 52px;
  border-radius: var(--radius-md);
  background: var(--surface-1);
  border: 1.5px solid var(--border-2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.4rem;
  transition: all var(--t-fast);
  box-shadow: var(--shadow-sm);
}
.cat-label {
  font-size: 0.62rem;
  font-weight: 600;
  color: var(--ink-3);
  white-space: nowrap;
  transition: color var(--t-fast);
}
.cat-btn.active .cat-icon-wrap {
  background: var(--ink);
  border-color: var(--ink);
}
.cat-btn.active .cat-label { color: var(--flame); }

/* ── FILTER ROW ── */
.filter-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
}
.filter-btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 6px 13px;
  background: var(--surface-1);
  border: 1.5px solid var(--border-2);
  border-radius: var(--radius-full);
  font-size: 0.73rem;
  font-weight: 600;
  color: var(--ink-2);
  transition: all var(--t-fast);
}
.filter-btn[aria-pressed="true"] {
  background: var(--ink);
  border-color: var(--ink);
  color: white;
}
.filter-btn[aria-pressed="true"].open-btn {
  background: var(--forest);
  border-color: var(--forest);
}
.status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}
.status-dot.green { background: var(--forest); }
.status-dot.red   { background: var(--rose); }
.result-count {
  font-size: 0.7rem;
  color: var(--ink-3);
  margin-left: auto;
}

/* ── SHOP CARDS ── */
.shop-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding: 14px 16px 8px;
}
.shop-card {
  display: flex;
  gap: 12px;
  background: var(--surface-1);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  cursor: pointer;
  box-shadow: var(--shadow-sm);
  transition: transform var(--t-fast), box-shadow var(--t-fast), border-color var(--t-fast);
  position: relative;
}
.shop-card::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 4px;
  border-radius: var(--radius-sm) 0 0 var(--radius-sm);
}
.shop-card:active { transform: translateX(3px); box-shadow: var(--shadow-md); }
.shop-card-inner {
  display: flex;
  gap: 12px;
  padding: 13px 13px 13px 17px;
  width: 100%;
}
.shop-emoji-wrap {
  width: 52px;
  height: 52px;
  border-radius: var(--radius-md);
  background: var(--surface-2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.5rem;
  flex-shrink: 0;
}
.shop-body { flex: 1; min-width: 0; }
.shop-name {
  font-family: var(--font-display);
  font-size: 0.9rem;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 1px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.shop-sector {
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--flame);
  margin-bottom: 4px;
}
.shop-addr {
  font-size: 0.7rem;
  color: var(--ink-3);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  margin-bottom: 6px;
}
.shop-foot {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}
.shop-status {
  font-size: 0.62rem;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: var(--radius-full);
}
.shop-status.open  { background: var(--forest-soft); color: var(--forest); }
.shop-status.closed { background: var(--rose-soft);  color: var(--rose); }
.shop-dist { font-size: 0.67rem; font-weight: 700; color: var(--ink-2); }
.shop-rating { font-size: 0.68rem; font-weight: 700; color: var(--amber); }
.shop-price  { font-size: 0.68rem; font-weight: 700; color: var(--flame); margin-left: auto; }

/* ── DISCOVER MAP COMPONENTS ── */
.disc-search-float {
  position: absolute;
  top: 10px;
  left: 10px;
  right: 10px;
  z-index: 50;
  display: flex;
  gap: 8px;
  align-items: center;
}
.disc-search-inner {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--surface-1);
  border-radius: var(--radius-md);
  padding: 11px 13px;
  box-shadow: var(--shadow-lg);
  border: 1px solid rgba(0,0,0,0.05);
}
.disc-search-input {
  flex: 1;
  border: none;
  background: none;
  font-size: 0.88rem;
  color: var(--ink);
  caret-color: var(--flame);
}
.disc-search-input::placeholder { color: var(--ink-4); }
.disc-clear {
  background: none;
  border: none;
  color: var(--ink-4);
  font-size: 0.9rem;
  padding: 0;
  cursor: pointer;
}
.disc-loc-btn {
  width: 46px;
  height: 46px;
  background: var(--surface-1);
  border: none;
  border-radius: var(--radius-md);
  font-size: 1.2rem;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: var(--shadow-lg);
  flex-shrink: 0;
}
.disc-cats {
  position: absolute;
  top: 68px;
  left: 0;
  right: 0;
  z-index: 49;
  display: flex;
  gap: 7px;
  overflow-x: auto;
  padding: 4px 10px;
  scrollbar-width: none;
}
.disc-cats::-webkit-scrollbar { display: none; }
.disc-cat-btn {
  flex-shrink: 0;
  padding: 6px 13px;
  background: var(--surface-1);
  border: 1.5px solid rgba(0,0,0,0.08);
  border-radius: var(--radius-full);
  font-size: 0.73rem;
  font-weight: 700;
  color: var(--ink-2);
  box-shadow: var(--shadow-sm);
  white-space: nowrap;
  cursor: pointer;
  transition: all var(--t-fast);
}
.disc-cat-btn.active { background: var(--ink); color: white; border-color: var(--ink); }

/* Discover FABs */
.disc-fabs {
  position: absolute;
  right: 10px;
  top: 50%;
  transform: translateY(-50%);
  z-index: 50;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.disc-fab {
  width: 46px;
  height: 46px;
  background: var(--surface-1);
  border: none;
  border-radius: var(--radius-md);
  font-size: 1.15rem;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: var(--shadow-md);
  cursor: pointer;
  transition: all var(--t-fast);
}
.disc-fab[aria-pressed="true"] {
  background: var(--flame);
}

/* Discover bottom sheet */
.disc-sheet {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 60;
  background: var(--surface-1);
  border-radius: var(--radius-xl) var(--radius-xl) 0 0;
  box-shadow: 0 -4px 24px rgba(0,0,0,0.12);
  transform: translateY(calc(100% - 76px));
  transition: transform var(--t-base) var(--ease-out);
}
.disc-sheet.expanded { transform: translateY(0); }
.disc-sheet-handle {
  padding: 10px 14px 8px;
  cursor: pointer;
  touch-action: none;
  user-select: none;
}
.handle-bar {
  width: 36px;
  height: 4px;
  background: var(--border-2);
  border-radius: var(--radius-full);
  margin: 0 auto 10px;
}
.disc-sheet-meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.disc-count {
  font-family: var(--font-display);
  font-size: 0.95rem;
  font-weight: 700;
  color: var(--ink);
}
.sort-btns { display: flex; gap: 4px; }
.sort-btn {
  padding: 4px 9px;
  background: var(--surface-2);
  border: 1px solid var(--border-2);
  border-radius: var(--radius-sm);
  font-size: 0.68rem;
  font-weight: 600;
  color: var(--ink-3);
  cursor: pointer;
  transition: all var(--t-fast);
}
.sort-btn.active {
  background: var(--flame-soft);
  border-color: var(--flame);
  color: var(--flame);
}
.disc-cards {
  overflow-y: auto;
  max-height: calc(65vh - 72px);
  padding: 0 12px 24px;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

/* Discover business card */
.disc-card {
  display: flex;
  gap: 10px;
  background: var(--surface-1);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 12px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: all var(--t-fast);
  animation: cardIn 0.22s var(--ease-out) both;
  box-shadow: var(--shadow-sm);
}
.disc-card:hover { border-color: var(--border-2); box-shadow: var(--shadow-md); }
.disc-card:active { transform: scale(0.98); }
.disc-card.highlighted { border-color: var(--flame); }
@keyframes cardIn {
  from { opacity: 0; transform: translateX(-6px); }
  to   { opacity: 1; transform: translateX(0); }
}
.disc-card-thumb {
  width: 50px;
  height: 50px;
  border-radius: var(--radius-sm);
  background: var(--surface-2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.4rem;
  flex-shrink: 0;
}
.disc-card-info { flex: 1; min-width: 0; }
.disc-card-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 4px;
  margin-bottom: 2px;
}
.disc-card-name {
  font-family: var(--font-display);
  font-size: 0.87rem;
  font-weight: 700;
  color: var(--ink);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  flex: 1;
}
.disc-card-status {
  font-size: 0.58rem;
  font-weight: 700;
  padding: 2px 6px;
  border-radius: var(--radius-full);
  flex-shrink: 0;
}
.disc-card-status.open  { background: var(--forest-soft); color: var(--forest); border: 1px solid var(--forest-soft); }
.disc-card-status.closed { background: var(--rose-soft);  color: var(--rose);   border: 1px solid var(--rose-soft); }
.disc-card-meta { font-size: 0.64rem; color: var(--ink-3); margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.disc-card-foot { display: flex; align-items: center; gap: 7px; font-size: 0.65rem; flex-wrap: wrap; }
.disc-card-dist { color: var(--ink-2); font-weight: 600; }
.disc-card-rating { color: var(--amber); font-weight: 700; }
.disc-card-price { color: var(--flame); font-weight: 700; margin-left: auto; }

/* ── MODALS ── */
.modal-overlay {
  position: fixed;
  inset: 0;
  z-index: 500;
  background: rgba(0, 0, 0, 0.55);
  backdrop-filter: blur(8px);
  display: flex;
  align-items: flex-end;
  justify-content: center;
  animation: fadeIn var(--t-base) ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal-sheet {
  background: var(--surface-1);
  border-radius: var(--radius-xl) var(--radius-xl) 0 0;
  width: 100%;
  max-width: 620px;
  max-height: 92vh;
  overflow-y: auto;
  animation: sheetUp var(--t-slow) var(--ease-out);
}
@keyframes sheetUp {
  from { transform: translateY(30px); opacity: 0; }
  to   { transform: translateY(0);    opacity: 1; }
}
.modal-sheet--tall { max-height: 94vh; }
.modal-drag-bar {
  width: 36px;
  height: 4px;
  background: var(--border-2);
  border-radius: var(--radius-full);
  margin: 12px auto 0;
}
.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 18px 12px;
  border-bottom: 1px solid var(--border);
}
.modal-title {
  font-family: var(--font-display);
  font-size: 1rem;
  font-weight: 700;
  color: var(--ink);
}
.modal-close {
  width: 30px;
  height: 30px;
  border: none;
  background: var(--surface-2);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.8rem;
  color: var(--ink-3);
  cursor: pointer;
  transition: all var(--t-fast);
}
.modal-close:hover { background: var(--border); color: var(--ink); }
.modal-close--float {
  position: absolute;
  top: 12px;
  right: 12px;
  z-index: 10;
  background: rgba(0,0,0,0.4);
  color: white;
}
.modal-body { padding: 16px 18px 20px; }

/* ── LOCATION MODAL ── */
.gps-btn {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  background: var(--forest-soft);
  border: 2px solid rgba(10, 124, 74, 0.22);
  border-radius: var(--radius-md);
  cursor: pointer;
  margin-bottom: 16px;
  transition: all var(--t-fast);
  text-align: left;
}
.gps-btn:hover { background: rgba(10, 124, 74, 0.15); }
.gps-btn-icon { font-size: 1.6rem; flex-shrink: 0; }
.gps-btn-text { display: flex; flex-direction: column; gap: 2px; }
.gps-btn-text strong { font-size: 0.9rem; font-weight: 700; color: var(--forest); }
.gps-btn-text span  { font-size: 0.7rem; color: rgba(10, 124, 74, 0.7); }
.divider {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
  font-size: 0.67rem;
  color: var(--ink-4);
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.divider::before, .divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}
.loc-search-row { display: flex; gap: 8px; margin-bottom: 10px; }
.loc-input {
  flex: 1;
  padding: 10px 13px;
  background: var(--surface-2);
  border: 1.5px solid var(--border-2);
  border-radius: var(--radius-md);
  font-size: 0.87rem;
  color: var(--ink);
  caret-color: var(--flame);
  transition: border-color var(--t-fast);
}
.loc-input:focus { border-color: var(--flame); }
.loc-input::placeholder { color: var(--ink-4); }
.loc-search-btn {
  padding: 10px 16px;
  background: var(--flame);
  color: white;
  border: none;
  border-radius: var(--radius-md);
  font-size: 0.84rem;
  font-weight: 700;
  transition: background var(--t-fast);
}
.loc-search-btn:hover { background: var(--flame-2); }
.loc-ac-drop { margin-bottom: 12px; }
.loc-ac-item {
  display: flex;
  align-items: center;
  gap: 9px;
  width: 100%;
  padding: 10px 12px;
  background: var(--surface-1);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  font-size: 0.83rem;
  color: var(--ink);
  margin-bottom: 5px;
  cursor: pointer;
  transition: background var(--t-fast);
  text-align: left;
}
.loc-ac-item:hover { background: var(--surface-2); }
.quick-cities-label {
  font-size: 0.67rem;
  font-weight: 700;
  color: var(--ink-3);
  letter-spacing: 0.07em;
  text-transform: uppercase;
  margin-bottom: 9px;
}
.quick-cities { display: flex; flex-wrap: wrap; gap: 7px; }
.city-chip {
  padding: 7px 13px;
  background: var(--surface-2);
  border: 1px solid var(--border-2);
  border-radius: var(--radius-full);
  font-size: 0.77rem;
  font-weight: 600;
  color: var(--ink-2);
  cursor: pointer;
  transition: all var(--t-fast);
}
.city-chip:hover { background: var(--flame-soft); color: var(--flame); border-color: var(--flame); }

/* ── SHOP DETAIL MODAL ── */
.shop-detail-hero {
  height: 180px;
  position: relative;
  overflow: hidden;
  border-radius: var(--radius-xl) var(--radius-xl) 0 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 72px;
}
.shop-detail-hero-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.85), transparent 50%);
}
.shop-detail-hero-body {
  position: absolute;
  bottom: 14px;
  left: 16px;
  right: 52px;
  z-index: 2;
}
.shop-detail-name {
  font-family: var(--font-display);
  font-size: 1.4rem;
  font-weight: 800;
  color: white;
  margin-bottom: 4px;
  line-height: 1.1;
}
.shop-detail-meta {
  font-size: 0.73rem;
  color: rgba(255,255,255,0.6);
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.shop-detail-body { padding: 16px 16px 28px; }

/* Quick info strip */
.quick-strip {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 16px;
}
.qi { display: flex; flex-direction: column; gap: 2px; }
.qi-label {
  font-size: 0.59rem;
  font-weight: 700;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  color: var(--ink-4);
}
.qi-value { font-size: 0.82rem; font-weight: 600; color: var(--ink); }

/* Action buttons */
.action-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin: 14px 0;
}
.action-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  padding: 12px;
  border-radius: var(--radius-md);
  font-size: 0.8rem;
  font-weight: 700;
  border: none;
  cursor: pointer;
  transition: all var(--t-fast);
}
.action-btn:active { transform: scale(0.97); }
.action-btn--wa   { background: #25D366; color: white; grid-column: 1 / -1; }
.action-btn--call { background: var(--flame-soft); border: 1.5px solid var(--flame-mid); color: var(--flame); }
.action-btn--map  { background: var(--blue-soft); border: 1.5px solid rgba(26,86,219,0.2); color: var(--blue); }
.action-btn--share { background: var(--surface-2); border: 1.5px solid var(--border-2); color: var(--ink-2); }

/* ── ADD SHOP ── */
.addshop-wrap { max-width: 640px; margin: 0 auto; padding: 20px 16px 32px; }
.addshop-hero { margin-bottom: 24px; }
.addshop-title {
  font-family: var(--font-display);
  font-size: 1.6rem;
  font-weight: 800;
  color: var(--ink);
  letter-spacing: -0.04em;
  margin-bottom: 6px;
}
.addshop-sub { font-size: 0.78rem; color: var(--ink-3); }

/* Step progress */
.step-progress {
  display: flex;
  align-items: center;
  gap: 4px;
  margin-bottom: 24px;
}
.step-node {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 2px solid var(--border-2);
  background: var(--surface-1);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.68rem;
  font-weight: 700;
  color: var(--ink-3);
  flex-shrink: 0;
  transition: all var(--t-base);
}
.step-node.active { background: var(--flame); border-color: var(--flame); color: white; box-shadow: 0 0 0 3px var(--flame-soft); }
.step-node.done   { background: var(--forest); border-color: var(--forest); color: white; }
.step-line {
  flex: 1;
  height: 2px;
  background: var(--border-2);
  transition: background var(--t-base);
}
.step-line.done { background: var(--forest); }

/* Step card */
.step-card {
  background: var(--surface-1);
  border: 1px solid var(--border-2);
  border-radius: var(--radius-lg);
  overflow: hidden;
  margin-bottom: 16px;
  box-shadow: var(--shadow-sm);
  animation: pageIn var(--t-base) var(--ease-out);
}
.step-card-header {
  padding: 16px 18px 12px;
  border-bottom: 1px solid var(--border);
}
.step-card-title {
  font-family: var(--font-display);
  font-size: 1rem;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 3px;
}
.step-card-sub { font-size: 0.74rem; color: var(--ink-3); }
.step-card-body { padding: 16px 18px; }

/* Form fields */
.field { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }
.field label { font-size: 0.71rem; font-weight: 600; color: var(--ink-2); }
.field label .req { color: var(--rose); }
.field-input {
  padding: 10px 13px;
  background: var(--surface-2);
  border: 1.5px solid var(--border-2);
  border-radius: var(--radius-md);
  font-size: 0.87rem;
  color: var(--ink);
  caret-color: var(--flame);
  transition: border-color var(--t-fast);
  width: 100%;
}
.field-input:focus { border-color: var(--flame); background: var(--surface-1); }
.field-input::placeholder { color: var(--ink-4); }
textarea.field-input { resize: vertical; min-height: 80px; font-family: var(--font-body); }
select.field-input { appearance: none; cursor: pointer; }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

/* Sector grid */
.sector-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(92px, 1fr));
  gap: 8px;
  margin-bottom: 12px;
}
.sector-item {
  background: var(--surface-2);
  border: 1.5px solid var(--border-2);
  border-radius: var(--radius-md);
  padding: 10px 6px;
  text-align: center;
  cursor: pointer;
  transition: all var(--t-fast);
}
.sector-item:hover { border-color: var(--flame-mid); }
.sector-item.selected { border-color: var(--flame); background: var(--flame-soft); }
.sector-emoji { font-size: 1.4rem; margin-bottom: 4px; }
.sector-name { font-size: 0.65rem; font-weight: 600; color: var(--ink-2); }
.sector-item.selected .sector-name { color: var(--flame); }

/* Step navigation */
.step-nav { display: flex; gap: 8px; margin-top: 16px; }
.btn-back {
  padding: 12px 18px;
  background: none;
  border: 1.5px solid var(--border-2);
  border-radius: var(--radius-md);
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--ink-3);
  transition: all var(--t-fast);
}
.btn-back:hover { border-color: var(--border-2); color: var(--ink); }
.btn-next {
  flex: 1;
  padding: 12px;
  background: var(--flame);
  color: white;
  border: none;
  border-radius: var(--radius-md);
  font-size: 0.87rem;
  font-weight: 700;
  transition: background var(--t-fast);
}
.btn-next:hover { background: var(--flame-2); }

/* ── ADD BANNER ── */
.add-banner {
  display: flex;
  align-items: center;
  gap: 13px;
  margin: 6px 16px 20px;
  padding: 16px 18px;
  background: var(--ink);
  border-radius: var(--radius-lg);
  cursor: pointer;
  transition: transform var(--t-fast);
}
.add-banner:active { transform: scale(0.99); }
.add-banner-icon {
  font-size: 1.4rem;
  width: 44px;
  height: 44px;
  background: var(--flame);
  border-radius: var(--radius-md);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.add-banner-body {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.add-banner-body strong { font-size: 0.87rem; font-weight: 700; color: white; }
.add-banner-body span  { font-size: 0.7rem; color: rgba(255,255,255,0.45); }
.add-banner-arrow { font-size: 1rem; color: rgba(255,255,255,0.3); }

/* ── SKELETON LOADER ── */
.skel {
  background: linear-gradient(90deg, var(--surface-2) 25%, var(--border) 50%, var(--surface-2) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite;
  border-radius: var(--radius-md);
}
@keyframes shimmer {
  0%   { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* ── EMPTY STATE ── */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  padding: 48px 20px;
  color: var(--ink-3);
}
.empty-state-icon { font-size: 2.5rem; margin-bottom: 14px; opacity: 0.5; }
.empty-state-title {
  font-family: var(--font-display);
  font-size: 1rem;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 6px;
}
.empty-state-sub { font-size: 0.79rem; line-height: 1.65; }

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: calc(var(--bnav-h) + 14px);
  left: 50%;
  transform: translateX(-50%) translateY(60px);
  opacity: 0;
  background: var(--ink-2);
  color: white;
  padding: 11px 20px;
  border-radius: var(--radius-lg);
  font-size: 0.8rem;
  font-weight: 600;
  z-index: 9999;
  white-space: nowrap;
  max-width: 88vw;
  text-align: center;
  pointer-events: none;
  box-shadow: var(--shadow-lg);
  transition: transform 0.25s var(--ease-out), opacity 0.25s ease;
}
.toast.visible {
  transform: translateX(-50%) translateY(0);
  opacity: 1;
}

/* ── BUTTONS ── */
.btn-primary {
  padding: 12px 24px;
  background: var(--flame);
  color: white;
  border: none;
  border-radius: var(--radius-md);
  font-size: 0.88rem;
  font-weight: 700;
  cursor: pointer;
  transition: background var(--t-fast);
}
.btn-primary:hover { background: var(--flame-2); }

.btn-secondary {
  padding: 12px 24px;
  background: none;
  color: var(--ink);
  border: 1.5px solid var(--border-2);
  border-radius: var(--radius-md);
  font-size: 0.87rem;
  font-weight: 600;
  cursor: pointer;
  transition: all var(--t-fast);
}

/* Toggle */
.toggle-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 11px 0;
  border-bottom: 1px solid var(--border);
}
.toggle-row:last-child { border-bottom: none; }
.toggle-label { font-size: 0.83rem; font-weight: 600; color: var(--ink); }
.toggle-sub { font-size: 0.68rem; color: var(--ink-3); margin-top: 1px; }
.toggle {
  position: relative;
  width: 42px;
  height: 24px;
  flex-shrink: 0;
}
.toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
.toggle-slider {
  position: absolute;
  inset: 0;
  background: var(--ink-5);
  border-radius: var(--radius-full);
  cursor: pointer;
  transition: background var(--t-base);
}
.toggle input:checked ~ .toggle-slider { background: var(--forest); }
.toggle-slider::after {
  content: '';
  position: absolute;
  width: 17px;
  height: 17px;
  border-radius: 50%;
  background: white;
  top: 3.5px;
  left: 3.5px;
  transition: transform var(--t-base) var(--ease-out);
  box-shadow: 0 1px 4px rgba(0,0,0,0.2);
}
.toggle input:checked ~ .toggle-slider::after { transform: translateX(18px); }

/* Map controls override */
.leaflet-container { background: #e8e3db !important; }
.leaflet-control-zoom { border: none !important; box-shadow: var(--shadow-md) !important; }
.leaflet-control-zoom a {
  width: 36px !important;
  height: 36px !important;
  line-height: 36px !important;
  border-radius: var(--radius-sm) !important;
  background: var(--surface-1) !important;
  color: var(--ink) !important;
  border: none !important;
  font-size: 1.1rem !important;
  margin-bottom: 4px !important;
}
.leaflet-control-attribution { display: none !important; }
.leaflet-popup-content-wrapper {
  background: var(--surface-1) !important;
  border: 1px solid var(--border-2) !important;
  border-radius: var(--radius-md) !important;
  box-shadow: var(--shadow-lg) !important;
}
.leaflet-popup-tip { background: var(--surface-1) !important; }

/* pages.css */

/* ── HOME PAGE ── */
.home-search-block {
  padding: 20px 16px 16px;
  background: var(--surface-0);
}
.home-eyebrow {
  font-size: 0.68rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-4);
  margin-bottom: 6px;
  font-family: var(--font-mono);
}
.home-heading {
  font-family: var(--font-display);
  font-size: clamp(1.7rem, 5vw, 2.4rem);
  font-weight: 800;
  color: var(--ink);
  letter-spacing: -0.05em;
  line-height: 1.1;
  margin-bottom: 16px;
}
.home-heading em {
  font-style: normal;
  color: var(--flame);
}

/* ── GROW PAGE ── */
.grow-hero {
  padding: 28px 16px 24px;
  background: linear-gradient(160deg, var(--ink) 0%, var(--ink-2) 100%);
  position: relative;
  overflow: hidden;
}
.grow-hero::before {
  content: '🚀';
  position: absolute;
  right: -20px;
  top: -10px;
  font-size: 120px;
  opacity: 0.06;
}
.grow-hero-pill {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 4px 12px;
  background: var(--flame-soft);
  border: 1px solid var(--flame-mid);
  border-radius: var(--radius-full);
  font-size: 0.66rem;
  font-weight: 700;
  color: var(--flame);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 14px;
}
.grow-hero-title {
  font-family: var(--font-display);
  font-size: clamp(1.7rem, 5vw, 2.4rem);
  font-weight: 800;
  color: white;
  letter-spacing: -0.04em;
  line-height: 1.1;
  margin-bottom: 10px;
}
.grow-hero-title span {
  background: linear-gradient(120deg, var(--flame), #FF8C00);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.grow-hero-sub {
  font-size: 0.87rem;
  color: rgba(255,255,255,0.55);
  line-height: 1.7;
  max-width: 380px;
}

/* Plans */
.plans-wrap { padding: 20px 16px; }
.plan-card {
  background: var(--surface-1);
  border: 1px solid var(--border-2);
  border-radius: var(--radius-xl);
  padding: 22px;
  margin-bottom: 14px;
  transition: transform var(--t-fast), box-shadow var(--t-fast);
  box-shadow: var(--shadow-sm);
  position: relative;
  overflow: hidden;
}
.plan-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
.plan-card--featured { border-color: var(--flame); border-width: 2px; }
.plan-featured-badge {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  background: var(--flame);
  color: white;
  text-align: center;
  font-size: 0.6rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  padding: 4px;
  text-transform: uppercase;
}
.plan-icon { font-size: 1.8rem; margin-bottom: 8px; }
.plan-name {
  font-family: var(--font-display);
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 5px;
}
.plan-desc { font-size: 0.77rem; color: var(--ink-3); line-height: 1.6; margin-bottom: 14px; }
.plan-price {
  font-family: var(--font-mono);
  font-size: 1.8rem;
  font-weight: 700;
  color: var(--flame);
  margin-bottom: 14px;
}
.plan-price sub { font-size: 0.8rem; color: var(--ink-3); font-family: var(--font-body); }
.plan-features { list-style: none; margin-bottom: 16px; }
.plan-features li {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 0.77rem;
  color: var(--ink-2);
  padding: 5px 0;
  border-bottom: 1px solid var(--border);
}
.plan-features li:last-child { border-bottom: none; }
.plan-features li::before { content: '✓'; color: var(--forest); font-weight: 700; flex-shrink: 0; }
.plan-btn {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: var(--radius-md);
  font-size: 0.87rem;
  font-weight: 700;
  cursor: pointer;
  transition: all var(--t-fast);
}
.plan-btn--flame { background: var(--flame); color: white; }
.plan-btn--flame:hover { background: var(--flame-2); }
.plan-btn--ghost {
  background: var(--surface-2);
  border: 1.5px solid var(--border-2);
  color: var(--ink-2);
}

/* ── PROFILE PAGE ── */
.profile-hero {
  height: 200px;
  background: linear-gradient(145deg, var(--ink), var(--ink-2));
  position: relative;
  display: flex;
  align-items: flex-end;
  padding: 16px;
  overflow: hidden;
}
.profile-hero-bg {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 100px;
  opacity: 0.07;
}
.profile-hero-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(12,11,9,0.9), transparent 55%);
}
.profile-hero-content { position: relative; z-index: 2; width: 100%; }
.profile-name {
  font-family: var(--font-display);
  font-size: 1.4rem;
  font-weight: 800;
  color: white;
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.profile-sub { font-size: 0.73rem; color: rgba(255,255,255,0.5); }

.profile-body { padding: 16px 16px 32px; }
.profile-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 16px;
}
.profile-stat {
  background: var(--surface-1);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 14px;
  text-align: center;
}
.profile-stat-n {
  font-family: var(--font-display);
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--ink);
}
.profile-stat-l {
  font-size: 0.59rem;
  color: var(--ink-3);
  text-transform: uppercase;
  letter-spacing: 0.07em;
  margin-top: 2px;
}

/* Menu */
.profile-menu {
  background: var(--surface-1);
  border: 1px solid var(--border-2);
  border-radius: var(--radius-lg);
  overflow: hidden;
  margin-bottom: 14px;
  box-shadow: var(--shadow-sm);
}
.profile-menu-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background var(--t-fast);
}
.profile-menu-item:last-child { border-bottom: none; }
.profile-menu-item:hover { background: var(--surface-2); }
.pmi-left { display: flex; align-items: center; gap: 10px; font-size: 0.85rem; font-weight: 600; color: var(--ink); }
.pmi-arrow { color: var(--ink-4); font-size: 0.85rem; }

/* My shop card */
.my-shop-card {
  background: var(--surface-1);
  border: 1px solid var(--border-2);
  border-radius: var(--radius-lg);
  overflow: hidden;
  margin-bottom: 12px;
  box-shadow: var(--shadow-sm);
  transition: all var(--t-fast);
}
.my-shop-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
.my-shop-banner {
  height: 72px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2rem;
  background: linear-gradient(135deg, var(--ink), var(--ink-2));
  position: relative;
}
.my-shop-live {
  position: absolute;
  top: 8px;
  right: 8px;
  padding: 2px 8px;
  background: var(--forest-soft);
  border: 1px solid rgba(10,124,74,0.3);
  border-radius: var(--radius-full);
  font-size: 0.6rem;
  font-weight: 700;
  color: #4ade80;
}
.my-shop-body { padding: 11px 14px; }
.my-shop-name {
  font-family: var(--font-display);
  font-size: 0.92rem;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 2px;
}
.my-shop-cat { font-size: 0.63rem; font-weight: 700; color: var(--flame); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
.my-shop-actions { display: flex; gap: 7px; margin-top: 10px; }
.my-shop-btn {
  flex: 1;
  padding: 7px 4px;
  border-radius: var(--radius-sm);
  font-size: 0.69rem;
  font-weight: 700;
  border: none;
  text-align: center;
  cursor: pointer;
  transition: all var(--t-fast);
}
.my-shop-btn--view { background: var(--flame); color: white; }
.my-shop-btn--boost { background: var(--flame-soft); border: 1px solid var(--flame-mid); color: var(--flame); }
.my-shop-btn--del { background: var(--rose-soft); border: 1px solid rgba(192,57,43,0.2); color: var(--rose); }

/* Sign-in card */
.signin-card {
  background: var(--surface-1);
  border: 1.5px solid var(--border-2);
  border-radius: var(--radius-lg);
  padding: 24px;
  text-align: center;
  margin-bottom: 16px;
  box-shadow: var(--shadow-sm);
}
.signin-icon { font-size: 2.5rem; margin-bottom: 14px; }
.signin-title {
  font-family: var(--font-display);
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 8px;
}
.signin-sub { font-size: 0.8rem; color: var(--ink-3); line-height: 1.65; margin-bottom: 20px; }
.google-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  width: 100%;
  padding: 13px 20px;
  background: white;
  color: #1a1a1a;
  border: 1.5px solid rgba(0,0,0,0.12);
  border-radius: var(--radius-md);
  font-size: 0.9rem;
  font-weight: 700;
  cursor: pointer;
  box-shadow: var(--shadow-sm);
  margin-bottom: 10px;
  transition: all var(--t-fast);
}
.google-btn:hover { box-shadow: var(--shadow-md); }
.phone-signin-row { display: flex; gap: 8px; }

/* animations.css */

/* Staggered list items */
.shop-card:nth-child(1) { animation-delay: 0ms; }
.shop-card:nth-child(2) { animation-delay: 40ms; }
.shop-card:nth-child(3) { animation-delay: 80ms; }
.shop-card:nth-child(4) { animation-delay: 120ms; }
.shop-card:nth-child(5) { animation-delay: 160ms; }
.shop-card:nth-child(n+6) { animation-delay: 200ms; }

@keyframes fadeSlideUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
.shop-card {
  animation: fadeSlideUp 0.3s var(--ease-out) both;
}

/* Featured cards */
.featured-card {
  animation: fadeSlideUp 0.35s var(--ease-out) both;
}
.featured-card:nth-child(1) { animation-delay: 50ms; }
.featured-card:nth-child(2) { animation-delay: 100ms; }
.featured-card:nth-child(3) { animation-delay: 150ms; }

/* Success animation */
@keyframes popIn {
  0%   { transform: scale(0); opacity: 0; }
  70%  { transform: scale(1.1); }
  100% { transform: scale(1); opacity: 1; }
}
.pop-in { animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }

/* Bounce up for FABs */
@keyframes bounceUp {
  0%   { transform: translateY(60px); opacity: 0; }
  60%  { transform: translateY(-6px); }
  100% { transform: translateY(0); opacity: 1; }
}

/* Swipe indicator */
@keyframes swipeHint {
  0%   { transform: translateX(0); }
  30%  { transform: translateX(-8px); }
  60%  { transform: translateX(4px); }
  100% { transform: translateX(0); }
}

/* GPS pulse */
@keyframes gpsPulse {
  0%, 100% { box-shadow: 0 0 0 0 var(--flame-soft); }
  50% { box-shadow: 0 0 0 8px transparent; }
}

/* Radar sweep */
@keyframes radarSweep {
  0%   { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

/* Map marker bounce */
@keyframes markerBounce {
  0%, 100% { transform: translateY(0); }
  50%       { transform: translateY(-8px); }
}

/* Reduce motion */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}

</style>
</head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
/* ── store.js ── */
/**
 * store.js — Centralized state management
 * Single source of truth. No scattered localStorage calls.
 */
const Store = (() => {
  // ── Keys ──
  const KEYS = {
    SHOPS:     'ds_shops_v3',
    ORDERS:    'ds_orders_v3',
    USER:      'ds_user_v2',
    LOCATION:  'ds_location_v2',
    CACHE_TS:  'ds_cache_ts',
    INSTALLED: 'ds_installed',
  };

  // ── In-memory state ──
  let state = {
    serverShops: [],
    localShops:  [],
    orders:      [],
    user:        null,       // { uid, name, email, photo, phone }
    location:    null,       // { lat, lng, name }
    catFilter:   '',
    searchQuery: '',
    nearMe:      false,
    openOnly:    false,
  };

  // ── Subscribers ──
  const listeners = {};
  function on(event, fn) {
    if (!listeners[event]) listeners[event] = [];
    listeners[event].push(fn);
  }
  function emit(event, data) {
    (listeners[event] || []).forEach(fn => fn(data));
  }

  // ── Persistence helpers ──
  function ls(key, val) {
    if (val === undefined) {
      try { return JSON.parse(localStorage.getItem(key)); } catch { return null; }
    }
    try { localStorage.setItem(key, JSON.stringify(val)); } catch (e) {
      // Storage full — evict oldest cache entries
      Object.keys(localStorage)
        .filter(k => k.startsWith('ds_cache_'))
        .forEach(k => localStorage.removeItem(k));
      try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
    }
  }

  // ── Init ──
  function init() {
    state.localShops = ls(KEYS.SHOPS)  || [];
    state.orders     = ls(KEYS.ORDERS) || [];
    state.user       = ls(KEYS.USER)   || null;
    state.location   = ls(KEYS.LOCATION) || null;
  }

  // ── Shops ──
  function allShops() {
    // Deduplicate: server is authoritative. Local shops not on server are shown too.
    const seen = new Set();
    const result = [];
    const norm = n => (n || '').toLowerCase().replace(/[^a-z0-9]/g, '');

    state.serverShops.forEach(s => {
      const key = norm(s.name) + norm(s.city || s.addr || '').slice(0, 8);
      if (!seen.has(key)) { seen.add(key); result.push({ ...s, _src: 'server' }); }
    });

    state.localShops.forEach(s => {
      const key = norm(s.name) + norm(s.city || s.addr || '').slice(0, 8);
      if (!seen.has(key)) { seen.add(key); result.push({ ...s, _src: 'local' }); }
    });

    return result;
  }

  function myShops() {
    const user = state.user;
    if (!user) return state.localShops;
    return state.localShops.filter(s => {
      if (user.uid && s.ownerUID === user.uid) return true;
      if (user.phone) {
        const sp = (s.wa || s.phone || '').replace(/\D/g, '').slice(-10);
        return sp === user.phone.replace(/\D/g, '').slice(-10);
      }
      return false;
    });
  }

  function addLocalShop(shop) {
    // Prevent duplicate by name
    const norm = n => (n || '').toLowerCase().trim();
    const idx = state.localShops.findIndex(s => norm(s.name) === norm(shop.name));
    if (idx >= 0) {
      state.localShops[idx] = { ...state.localShops[idx], ...shop };
    } else {
      state.localShops.unshift(shop);
    }
    ls(KEYS.SHOPS, state.localShops);
    emit('shops-changed');
  }

  function deleteLocalShop(id) {
    state.localShops = state.localShops.filter(s => s.id !== id);
    ls(KEYS.SHOPS, state.localShops);
    emit('shops-changed');
  }

  function setServerShops(shops) {
    state.serverShops = shops;
    ls(KEYS.CACHE_TS, Date.now());
    emit('shops-changed');
  }

  // ── Location ──
  function setLocation(lat, lng, name) {
    state.location = { lat, lng, name };
    ls(KEYS.LOCATION, state.location);
    emit('location-changed', state.location);
  }

  // ── User ──
  function setUser(user) {
    state.user = user;
    ls(KEYS.USER, user);
    emit('user-changed', user);
  }
  function clearUser() { setUser(null); }
  function isLoggedIn() { return !!(state.user?.uid || state.user?.phone); }

  // ── Orders ──
  function addOrder(order) {
    state.orders.unshift(order);
    ls(KEYS.ORDERS, state.orders.slice(0, 200));
    emit('orders-changed');
  }
  function updateOrder(id, patch) {
    const idx = state.orders.findIndex(o => o.id === id);
    if (idx >= 0) {
      state.orders[idx] = { ...state.orders[idx], ...patch };
      ls(KEYS.ORDERS, state.orders);
      emit('orders-changed');
    }
  }
  function myOrders() {
    const phone = state.user?.phone;
    if (!phone) return state.orders;
    const p10 = phone.replace(/\D/g,'').slice(-10);
    return state.orders.filter(o => {
      const sp = (o.shopPhone || '').replace(/\D/g,'').slice(-10);
      return sp === p10 || sp.includes(p10);
    });
  }
  function pendingOrderCount() {
    return myOrders().filter(o => o.status === 'pending').length;
  }

  // ── Filters ──
  function setFilter(key, val) {
    state[key] = val;
    emit('filter-changed', { key, val });
  }

  // ── Cache validation ──
  function isCacheStale(maxAgeMs = 5 * 60 * 1000) {
    const ts = ls(KEYS.CACHE_TS) || 0;
    return Date.now() - ts > maxAgeMs;
  }

  return {
    init, on, emit,
    get state() { return state; },
    allShops, myShops,
    addLocalShop, deleteLocalShop, setServerShops,
    setLocation, setUser, clearUser, isLoggedIn,
    addOrder, updateOrder, myOrders, pendingOrderCount,
    setFilter, isCacheStale,
    // direct state access for reads
    get location() { return state.location; },
    get user() { return state.user; },
  };
})();


/* ── api.js ── */
/**
 * api.js — All server communication in one place
 * Clean error handling. No server calls scattered across the app.
 */
const API = (() => {
  const BASE = 'https://deckscrab-backend-production.up.railway.app';
  const TIMEOUT = 10000; // 10s

  let _online = false;
  let _waking = false;

  // ── Core fetch with timeout + error handling ──
  async function req(method, path, body) {
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), TIMEOUT);
    try {
      const opts = {
        method,
        signal: ctrl.signal,
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      };
      if (body) opts.body = JSON.stringify(body);
      const res = await fetch(BASE + path, opts);
      clearTimeout(timer);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return await res.json();
    } catch (err) {
      clearTimeout(timer);
      if (err.name === 'AbortError') throw new Error('Request timed out');
      throw err;
    }
  }

  const get  = path       => req('GET',    path);
  const post = (path, b)  => req('POST',   path, b);
  const patch = (path, b) => req('PATCH',  path, b);
  const del  = path       => req('DELETE', path);

  // ── Health check & wake ──
  async function ping() {
    try {
      const r = await get('/health');
      _online = !!(r && (r.status === 'ok' || r.uptime));
      return _online;
    } catch {
      _online = false;
      return false;
    }
  }

  async function wake() {
    if (_waking) return _online;
    _waking = true;
    for (let i = 0; i < 3; i++) {
      const ok = await ping();
      if (ok) { _waking = false; return true; }
      if (i < 2) await sleep(3500);
    }
    _waking = false;
    return false;
  }

  // ── Businesses ──
  async function getShops({ q = '', lat, lng, radius = 100, limit = 200 } = {}) {
    const params = new URLSearchParams({ limit });
    if (q)   params.set('q', q);
    if (lat) { params.set('lat', lat); params.set('lng', lng); params.set('radius', radius); }
    const data = await get(`/api/businesses?${params}`);
    return data?.businesses || [];
  }

  async function createShop(shop) {
    return post('/api/businesses', shop);
  }

  async function updateShop(id, patch_data) {
    return patch(`/api/businesses/${id}`, patch_data);
  }

  async function deleteShop(id) {
    return del(`/api/businesses/${id}`);
  }

  async function getShopBySlug(slug) {
    // Try exact ID first, then search by name
    const data = await get(`/api/businesses?limit=500`);
    const shops = data?.businesses || [];
    return shops.find(s =>
      slugify(s.name) === slug || loosify(s.name) === loosify(slug)
    ) || null;
  }

  // ── Orders ──
  async function createOrder(order) {
    return post('/api/orders', order);
  }

  async function getOrders({ shopPhone } = {}) {
    const params = new URLSearchParams({ limit: 200 });
    if (shopPhone) params.set('phone', shopPhone);
    const data = await get(`/api/orders?${params}`);
    return data?.orders || [];
  }

  async function updateOrderStatus(id, status) {
    return patch(`/api/orders/${id}`, { status, updatedAt: Date.now() });
  }

  // ── Analytics ──
  async function trackEvent(shopId, event) {
    try {
      await post('/api/analytics', { shopId, event, ts: Date.now() });
    } catch {} // Never throw on analytics
  }

  // ── Geocoding (Nominatim) ──
  async function geocode(query) {
    const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=5&accept-language=en`;
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), 8000);
    try {
      const res = await fetch(url, {
        headers: { 'User-Agent': 'Deckscrab/2.0 (contact@deckscrab.in)', 'Accept-Language': 'en' },
        signal: ctrl.signal,
      });
      clearTimeout(timer);
      return await res.json();
    } catch {
      clearTimeout(timer);
      return [];
    }
  }

  async function reverseGeocode(lat, lng) {
    const url = `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&zoom=16`;
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), 8000);
    try {
      const res = await fetch(url, {
        headers: { 'User-Agent': 'Deckscrab/2.0 (contact@deckscrab.in)', 'Accept-Language': 'en' },
        signal: ctrl.signal,
      });
      clearTimeout(timer);
      const d = await res.json();
      const a = d.address || {};
      return {
        name: a.hamlet || a.suburb || a.neighbourhood || a.village || a.town || a.city || 'Your Location',
        city: a.city || a.town || a.village || '',
        pincode: a.postcode || '',
      };
    } catch {
      clearTimeout(timer);
      return { name: 'Your Location', city: '', pincode: '' };
    }
  }

  // ── Helpers ──
  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
  function slugify(name) {
    return (name || '').toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '').replace(/-+/g, '-').replace(/^-|-$/g, '');
  }
  function loosify(name) {
    return (name || '').toLowerCase().replace(/[^a-z0-9]/g, '');
  }

  // ── Keep-alive ──
  let _keepAliveInterval = null;
  function startKeepAlive() {
    if (_keepAliveInterval) return;
    _keepAliveInterval = setInterval(async () => {
      if (!_online) await wake();
      else await ping();
    }, 4 * 60 * 1000);
  }

  // Normalize raw server business into app shape
  function normalize(b) {
    return {
      id:          b.id || b._id || b.bizId,
      bizId:       b.bizId || b.id,
      name:        b.name || 'Business',
      e:           b.sectorEmoji || '🏪',
      sectorEmoji: b.sectorEmoji || '🏪',
      sector:      b.sector || '',
      sectorName:  b.sectorName || b.sector || 'Local Business',
      g:           b.g || 'retail',
      desc:        b.description || '',
      addr:        b.address || '',
      city:        b.city || '',
      lat:         b.lat ? parseFloat(b.lat) : null,
      lng:         b.lng ? parseFloat(b.lng) : null,
      phone:       b.phone || '',
      wa:          b.whatsapp || b.phone || '',
      oh:          b.hours?.Monday?.open  || '09:00',
      oc:          b.hours?.Monday?.close || '21:00',
      rating:      parseFloat(b.rating) || 0,
      rc:          parseInt(b.reviewCount) || 0,
      views:       parseInt(b.views) || 1,
      verified:    !!b.verified,
      delivery:    !!b.delivery,
      price:       parseInt(b.priceLevel) || 2,
      prods:       (b.products || []).map(p => ({ n: p.name, p: parseFloat(p.price) || 0, emoji: p.emoji || '🍽️', cat: p.category || 'Menu', desc: p.description || '' })),
      photos:      b.photos || [],
      ownerUID:    b.ownerUID || '',
      reg:         b.registeredAt || 0,
      websiteTemplate: b.websiteTemplate || '',
      customHtml:  b.customHtml || '',
      websiteUrl:  b.websiteUrl || '',
      websiteEnabled: !!b.websiteEnabled,
    };
  }

  return {
    get isOnline() { return _online; },
    ping, wake, startKeepAlive,
    getShops, createShop, updateShop, deleteShop, getShopBySlug,
    createOrder, getOrders, updateOrderStatus,
    trackEvent,
    geocode, reverseGeocode,
    normalize, slugify,
  };
})();


/* ── utils.js ── */
/**
 * utils.js — Shared utility functions
 */
const Utils = (() => {

  // ── Distance ──
  function km(lat1, lng1, lat2, lng2) {
    const R = 6371;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLng = (lng2 - lng1) * Math.PI / 180;
    const a = Math.sin(dLat / 2) ** 2 +
              Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
              Math.sin(dLng / 2) ** 2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  }

  function fmtDist(d) {
    return d < 1 ? Math.round(d * 1000) + 'm' : d.toFixed(1) + ' km';
  }

  // ── Open/Closed ──
  function isOpen(shop) {
    try {
      const now = new Date();
      const cur = now.getHours() * 60 + now.getMinutes();
      const [oh, om] = (shop.oh || '00:00').split(':').map(Number);
      const [ch, cm] = (shop.oc || '23:59').split(':').map(Number);
      if (oh === 0 && ch === 23) return true;
      return cur >= (oh * 60 + om) && cur <= (ch * 60 + cm);
    } catch { return false; }
  }

  // ── Stars HTML ──
  function starsHtml(rating, size = '0.8rem') {
    return [1, 2, 3, 4, 5].map(i =>
      `<span style="color:${i <= Math.round(rating) ? '#D97706' : 'var(--ink-5)'};font-size:${size}">★</span>`
    ).join('');
  }

  // ── Price level ──
  function priceLevel(shop) {
    return '₹'.repeat(Math.min(Math.max(parseInt(shop.price || 2), 1), 3));
  }

  // ── Sector color ──
  const SECTOR_COLORS = {
    food: '#E8521A', restaurant: '#E8521A', cafe: '#92400E',
    grocery: '#1D4ED8', retail: '#1D4ED8',
    health: '#0891B2', hospital: '#0E7490', doctor: '#0D9488', pharmacy: '#059669',
    beauty: '#DB2777', salon: '#BE185D', gym: '#7C3AED',
    service: '#D97706', mechanic: '#B45309', welder: '#C2410C',
    education: '#4F46E5', finance: '#1E3A5F',
    religious: '#B45309', temple: '#92400E',
  };
  function sectorColor(shop) {
    const sec = (shop.sector || shop.sectorName || shop.g || '').toLowerCase();
    for (const [k, v] of Object.entries(SECTOR_COLORS)) {
      if (sec.includes(k)) return v;
    }
    return '#4B5563';
  }

  // ── Toast ──
  let _toastTimer;
  function toast(msg, duration = 2800) {
    const el = document.getElementById('toast');
    if (!el) return;
    el.textContent = msg;
    el.classList.add('visible');
    clearTimeout(_toastTimer);
    _toastTimer = setTimeout(() => el.classList.remove('visible'), duration);
  }

  // ── Debounce ──
  function debounce(fn, ms) {
    let t;
    return (...args) => {
      clearTimeout(t);
      t = setTimeout(() => fn(...args), ms);
    };
  }

  // ── DOM helpers ──
  function el(id) { return document.getElementById(id); }
  function setText(id, val) { const e = el(id); if (e) e.textContent = val; }
  function setHTML(id, val) { const e = el(id); if (e) e.innerHTML = val; }

  // ── Share shop ──
  function shareShop(shop) {
    const slug = API.slugify(shop.name);
    const url = `https://waseem-2007.github.io/deckscrab/?shop=${slug}`;
    const text = `🏪 ${shop.name}\n📍 ${shop.addr || ''}, ${shop.city || ''}\n\nOrder online: ${url}`;
    if (navigator.share) {
      navigator.share({ title: shop.name, text, url }).catch(() => {});
    } else {
      window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
    }
  }

  // ── WhatsApp link ──
  function waLink(phone, msg) {
    const clean = (phone || '').replace(/\D/g, '').slice(-10);
    return `https://wa.me/91${clean}?text=${encodeURIComponent(msg)}`;
  }

  // ── Generate unique ID ──
  function uid(prefix = 'ds') {
    return `${prefix}_${Date.now()}_${Math.random().toString(36).slice(2, 7)}`;
  }

  // ── Sanitize string ──
  function sanitize(str, maxLen = 200) {
    return (str || '').replace(/[<>"']/g, '').trim().slice(0, maxLen);
  }

  // ── Compress image in browser ──
  function compressImage(file, maxPx = 800, quality = 0.82) {
    return new Promise(resolve => {
      const img = new Image();
      const url = URL.createObjectURL(file);
      img.onload = () => {
        URL.revokeObjectURL(url);
        let { width: w, height: h } = img;
        if (w > maxPx || h > maxPx) {
          if (w > h) { h = Math.round(h * maxPx / w); w = maxPx; }
          else { w = Math.round(w * maxPx / h); h = maxPx; }
        }
        const c = document.createElement('canvas');
        c.width = w; c.height = h;
        c.getContext('2d').drawImage(img, 0, 0, w, h);
        c.toBlob(blob => resolve(blob || file), 'image/jpeg', quality);
      };
      img.onerror = () => resolve(file);
      img.src = url;
    });
  }

  return {
    km, fmtDist, isOpen, starsHtml, priceLevel, sectorColor,
    toast, debounce,
    el, setText, setHTML,
    shareShop, waLink, uid, sanitize, compressImage,
  };
})();


/* ── location.js ── */
/**
 * location.js — Location detection and selection
 */
const LocationModule = (() => {
  let _acTimer;

  function openModal() {
    const ov = Utils.el('locModalOv');
    if (ov) { ov.hidden = false; Utils.el('locSearchInp')?.focus(); }
  }

  function closeModal() {
    const ov = Utils.el('locModalOv');
    if (ov) ov.hidden = true;
  }

  function pick(name, lat, lng) {
    Store.setLocation(lat, lng, name);
    const short = name.split(',')[0];
    Utils.el('locChipText').textContent = short;
    Utils.toast(`📍 ${short}`);
    closeModal();
    // Refresh views
    DS.home.render();
    if (DS.discover._map) DS.discover.render();
  }

  async function startGPS() {
    if (!navigator.geolocation) {
      Utils.toast('GPS not supported in this browser');
      return;
    }
    const btn   = Utils.el('gpsBtn');
    const icon  = Utils.el('gpsBtnIcon');
    const title = Utils.el('gpsBtnTitle');
    const sub   = Utils.el('gpsBtnSub');

    if (btn) btn.disabled = true;
    if (icon) icon.textContent = '⏳';
    if (title) title.textContent = 'Getting location…';

    navigator.geolocation.getCurrentPosition(
      async pos => {
        const { latitude: lat, longitude: lng } = pos.coords;
        if (icon)  icon.textContent  = '✅';
        if (title) title.textContent = 'Location found!';
        if (btn)   btn.disabled = false;

        const geo = await API.reverseGeocode(lat, lng);
        pick(geo.name, lat, lng);
      },
      err => {
        if (btn)   btn.disabled = false;
        if (icon)  icon.textContent  = '📡';
        if (title) title.textContent = 'Use My Current Location';
        if (sub)   sub.textContent   = 'Tap → allow → finds businesses near you';
        const msgs = {
          1: '❌ Allow location access in browser settings',
          2: '❌ GPS unavailable — type your city',
          3: '❌ GPS timed out — type your city',
        };
        Utils.toast(msgs[err.code] || '❌ GPS failed');
      },
      { enableHighAccuracy: true, timeout: 12000, maximumAge: 0 }
    );
  }

  function autocomplete(query) {
    clearTimeout(_acTimer);
    const drop = Utils.el('locAcDrop');
    if (!drop) return;
    if (query.length < 2) { drop.innerHTML = ''; return; }

    _acTimer = setTimeout(async () => {
      const results = await API.geocode(query + ', India');
      drop.innerHTML = results.slice(0, 5).map(r => {
        const parts = (r.display_name || '').split(',');
        const name  = parts[0].trim();
        const sub   = parts.slice(1, 3).join(',').trim();
        const lat   = parseFloat(r.lat);
        const lng   = parseFloat(r.lon);
        return `<button class="loc-ac-item" onclick="DS.location.pick('${name.replace(/'/g, "\\'")}',${lat},${lng})">
          📍 <span><strong>${name}</strong>${sub ? `<span style="color:var(--ink-3);font-size:.76rem;margin-left:6px">${sub}</span>` : ''}</span>
        </button>`;
      }).join('');
    }, 300);
  }

  function doSearch() {
    const q = Utils.el('locSearchInp')?.value?.trim();
    if (!q) { Utils.toast('Type your city or area name'); return; }
    autocomplete(q + ' Tamil Nadu');
  }

  return { openModal, closeModal, pick, startGPS, autocomplete, doSearch };
})();


/* ── map.js ── */
/**
 * map.js — Shared map utilities
 * Core Leaflet map functionality shared between discover and detail.
 */
const MapUtils = (() => {

  const TILE_URL = 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png';
  const TILE_OPTS = { maxZoom: 20, subdomains: 'abcd' };

  function createMap(containerId, lat, lng, zoom = 14, opts = {}) {
    const el = document.getElementById(containerId);
    if (!el || typeof L === 'undefined') return null;

    const map = L.map(containerId, {
      zoomControl: opts.zoomControl ?? false,
      attributionControl: false,
      scrollWheelZoom: opts.scrollWheelZoom ?? false,
      dragging: opts.dragging ?? true,
      tap: true,
      tapTolerance: 15,
      preferCanvas: true,
      ...opts,
    }).setView([lat, lng], zoom);

    L.tileLayer(TILE_URL, TILE_OPTS).addTo(map);
    return map;
  }

  function shopMarker(shop, opts = {}) {
    const open  = Utils.isOpen(shop);
    const color = open ? Utils.sectorColor(shop) : '#9CA3AF';
    const emoji = shop.e || shop.sectorEmoji || '🏪';
    return L.divIcon({
      className: '',
      html: `<div style="
        background:${color};
        width:${opts.size || 40}px;
        height:${opts.size || 40}px;
        border-radius:50%;
        border:3px solid white;
        box-shadow:0 3px 10px rgba(0,0,0,.28);
        display:flex;
        align-items:center;
        justify-content:center;
        font-size:${opts.fontSize || 17}px
      ">${emoji}</div>`,
      iconSize: [opts.size || 40, opts.size || 40],
      iconAnchor: [opts.size / 2 || 20, opts.size / 2 || 20],
      popupAnchor: [0, -(opts.size / 2 || 24)],
    });
  }

  function userMarker() {
    return L.circleMarker;
  }

  function fitBounds(map, points, padding = [80, 60]) {
    if (!map || !points.length) return;
    try {
      if (points.length === 1) { map.setView(points[0], 16, { animate: true }); return; }
      map.fitBounds(L.latLngBounds(points), { padding, maxZoom: 16, animate: true });
    } catch {}
  }

  function invalidate(map, delays = [50, 200, 500]) {
    delays.forEach(t => setTimeout(() => map && map.invalidateSize({ pan: false }), t));
  }

  return { createMap, shopMarker, userMarker, fitBounds, invalidate };
})();
