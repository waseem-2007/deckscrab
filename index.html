/**
 * home.js — Home page rendering and interactions
 */
const HomeModule = (() => {
  const CAT_GROUPS = {
    food:       ['food','restaurant','tiffin','biryani','fastfood','cafe','juice','sweets','icecream','catering','cakeshop','bakery','mess','hotel'],
    grocery:    ['grocery','retail','supermarket','fruits','dairy','kirana','provision'],
    health:     ['health','doctor','dentist','hospital','lab','physio','pharmacy','clinic','medical','nursing'],
    service:    ['service','welder','welding','plumber','electrician','mechanic','carpenter','painter','tailor','acrepair','mobilerepair','cleaning','taxi','courier'],
    beauty:     ['beauty','salon','spa','gym','yoga','cosmetics','parlour'],
    education:  ['education','school','tuition','computer','driving','music','library','coaching'],
    finance:    ['finance','bank','insurance','ca','lawyer','realestate','travel'],
    religious:  ['religious','temple','church','mosque','pooja'],
    retail:     ['retail','clothes','electronics','hardware','jewellery','furniture','shoes','opticals'],
  };

  const CATS = [
    { id: '',          emoji: '🌟', label: 'All' },
    { id: 'food',      emoji: '🍛', label: 'Food' },
    { id: 'grocery',   emoji: '🛒', label: 'Grocery' },
    { id: 'health',    emoji: '🏥', label: 'Health' },
    { id: 'service',   emoji: '🔧', label: 'Service' },
    { id: 'beauty',    emoji: '💇', label: 'Beauty' },
    { id: 'education', emoji: '🏫', label: 'School' },
    { id: 'finance',   emoji: '🏦', label: 'Finance' },
    { id: 'religious', emoji: '🛕', label: 'Temple' },
    { id: 'retail',    emoji: '🛍️', label: 'Shops' },
  ];

  function shopMatchesCat(shop, cat) {
    if (!cat) return true;
    const sec = (shop.sector || shop.sectorName || shop.g || '').toLowerCase();
    if (shop.g === cat) return true;
    return (CAT_GROUPS[cat] || []).some(k => sec.includes(k) || shop.g === k);
  }

  function buildCatBar() {
    const bar = Utils.el('catBar');
    if (!bar) return;
    const cur = Store.state.catFilter;
    bar.innerHTML = CATS.map(c => `
      <button
        class="cat-btn ${cur === c.id ? 'active' : ''}"
        onclick="DS.home.setCat('${c.id}',this)"
        role="tab"
        aria-selected="${cur === c.id}"
      >
        <div class="cat-icon-wrap">${c.emoji}</div>
        <span class="cat-label">${c.label}</span>
      </button>`
    ).join('');
  }

  function setCat(cat, el) {
    Store.setFilter('catFilter', cat);
    document.querySelectorAll('.cat-btn').forEach(b => {
      b.classList.remove('active');
      b.setAttribute('aria-selected', 'false');
    });
    if (el) { el.classList.add('active'); el.setAttribute('aria-selected', 'true'); }
    render();
  }

  function toggleNear() {
    const newVal = !Store.state.nearMe;
    Store.setFilter('nearMe', newVal);
    const btn = Utils.el('filterNear');
    if (btn) btn.setAttribute('aria-pressed', newVal);
    if (newVal && !Store.location) { DS.location.openModal(); Store.setFilter('nearMe', false); if (btn) btn.setAttribute('aria-pressed', 'false'); return; }
    if (newVal) Utils.toast('📍 Showing closest shops first');
    render();
  }

  function toggleOpen() {
    const newVal = !Store.state.openOnly;
    Store.setFilter('openOnly', newVal);
    const btn = Utils.el('filterOpen');
    if (btn) { btn.setAttribute('aria-pressed', newVal); btn.classList.toggle('open-btn', newVal); }
    if (newVal) Utils.toast('🟢 Open shops only');
    render();
  }

  const onSearch = Utils.debounce(q => { Store.setFilter('searchQuery', q); render(); }, 280);

  function quickSearch(term) {
    const inp = Utils.el('homeSearchInp');
    if (inp) inp.value = term;
    Store.setFilter('searchQuery', term.toLowerCase());
    render();
  }

  function runSearch() {
    const q = Utils.el('homeSearchInp')?.value || '';
    Store.setFilter('searchQuery', q.toLowerCase());
    render();
  }

  function getFiltered() {
    let shops = Store.allShops();
    const { searchQuery, catFilter, openOnly, nearMe } = Store.state;
    const loc = Store.location;

    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      shops = shops.filter(s =>
        (s.name || '').toLowerCase().includes(q) ||
        (s.sectorName || s.sector || '').toLowerCase().includes(q) ||
        (s.desc || '').toLowerCase().includes(q) ||
        (s.city || '').toLowerCase().includes(q) ||
        (s.addr || '').toLowerCase().includes(q)
      );
    }

    if (catFilter) shops = shops.filter(s => shopMatchesCat(s, catFilter));
    if (openOnly)  shops = shops.filter(s => Utils.isOpen(s));
    if (nearMe && loc) {
      shops.sort((a, b) => {
        const da = (a.lat && a.lng) ? Utils.km(loc.lat, loc.lng, +a.lat, +a.lng) : 9999;
        const db = (b.lat && b.lng) ? Utils.km(loc.lat, loc.lng, +b.lat, +b.lng) : 9999;
        return da - db;
      });
    }

    return shops;
  }

  function renderFeatured() {
    const wrap = Utils.el('featuredScroll');
    if (!wrap) return;
    // Only show when no filters active
    const { searchQuery, catFilter, openOnly, nearMe } = Store.state;
    const featWrap = wrap.closest ? wrap.parentElement?.previousElementSibling : null;

    if (searchQuery || catFilter || openOnly || nearMe) {
      wrap.style.display = 'none';
      const hdr = wrap.previousElementSibling;
      if (hdr) hdr.style.display = 'none';
      return;
    }
    wrap.style.display = '';
    const prevEl = wrap.previousElementSibling;
    if (prevEl) prevEl.style.display = '';

    const loc = Store.location;
    const featured = Store.allShops()
      .filter(s => Utils.isOpen(s))
      .sort((a, b) => (b.rating || 0) - (a.rating || 0))
      .slice(0, 6);

    const GRADS = [
      'linear-gradient(150deg,#2d0e00,#7c2d00)',
      'linear-gradient(150deg,#001228,#0b2e60)',
      'linear-gradient(150deg,#00200a,#005928)',
      'linear-gradient(150deg,#1a0015,#4a0035)',
      'linear-gradient(150deg,#0a0010,#1a0040)',
      'linear-gradient(150deg,#1a1000,#3d2800)',
    ];

    wrap.innerHTML = featured.length
      ? featured.map((s, i) => {
          const open = Utils.isOpen(s);
          const dist = loc && s.lat && s.lng
            ? Utils.fmtDist(Utils.km(loc.lat, loc.lng, +s.lat, +s.lng))
            : null;
          return `
          <div class="featured-card" style="background:${GRADS[i % GRADS.length]}" onclick="DS.detail.open('${s.id}')" role="listitem">
            <div class="feat-bg">${s.e || s.sectorEmoji || '🏪'}</div>
            <div class="feat-overlay"></div>
            <div class="feat-body">
              <div class="feat-category">${s.sectorName || s.sector || ''} · ${s.city || ''}</div>
              <div class="feat-name">${s.name}</div>
              <div class="feat-meta">
                <span class="${open ? 'feat-open' : 'feat-closed'}">${open ? 'Open' : 'Closed'}</span>
                ${dist ? `<span class="feat-dist">📍 ${dist}</span>` : ''}
                ${s.rating ? `<span class="feat-stars">★ ${s.rating}</span>` : ''}
              </div>
            </div>
          </div>`;
        }).join('')
      : '<div style="padding:20px;color:var(--ink-3);font-size:.82rem">Loading nearby businesses…</div>';
  }

  function renderList(shops) {
    const list = Utils.el('homeShopList');
    if (!list) return;
    const count = Utils.el('homeResultCount');
    if (count) count.textContent = shops.length ? `${shops.length} business${shops.length !== 1 ? 'es' : ''}` : '';

    if (!shops.length) {
      const { searchQuery, catFilter } = Store.state;
      list.innerHTML = `
        <div class="empty-state">
          <div class="empty-state-icon">🏪</div>
          <div class="empty-state-title">${searchQuery ? `No results for "${searchQuery}"` : 'No businesses yet'}</div>
          <div class="empty-state-sub">${searchQuery || catFilter ? 'Try a different search.' : 'Be the first to register!'}</div>
          <button class="btn-primary" style="margin-top:16px" onclick="DS.nav.go('addshop')">+ Register Your Business</button>
        </div>`;
      return;
    }

    const loc = Store.location;
    list.innerHTML = shops.map(s => {
      const open  = Utils.isOpen(s);
      const dist  = loc && s.lat && s.lng ? Utils.km(loc.lat, loc.lng, +s.lat, +s.lng) : null;
      const color = Utils.sectorColor(s);
      return `
        <div class="shop-card" onclick="DS.detail.open('${s.id}')" role="listitem" style="--accent:${color}">
          <div class="shop-card-accent" style="position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:var(--radius-sm) 0 0 var(--radius-sm);background:${color}"></div>
          <div class="shop-card-inner">
            <div class="shop-emoji-wrap" style="background:${color}18;border:1.5px solid ${color}33">${s.e || s.sectorEmoji || '🏪'}</div>
            <div class="shop-body">
              <div class="shop-name">${s.name}</div>
              <div class="shop-sector">${s.sectorName || s.sector || ''}</div>
              ${s.addr || s.city ? `<div class="shop-addr">📍 ${[s.addr, s.city].filter(Boolean).join(', ')}</div>` : ''}
              <div class="shop-foot">
                <span class="shop-status ${open ? 'open' : 'closed'}">${open ? '● Open' : '● Closed'}</span>
                ${dist !== null ? `<span class="shop-dist">📍 ${Utils.fmtDist(dist)}</span>` : ''}
                ${s.rating ? `<span class="shop-rating">★ ${s.rating}</span>` : ''}
                <span class="shop-price">${Utils.priceLevel(s)}</span>
              </div>
            </div>
          </div>
        </div>`;
    }).join('');
  }

  function showSkeletons(n = 4) {
    const list = Utils.el('homeShopList');
    if (!list) return;
    list.innerHTML = Array(n).fill(0).map(() =>
      `<div class="skel" style="height:88px;margin-bottom:10px;border-radius:var(--radius-lg)"></div>`
    ).join('');
  }

  async function render() {
    buildCatBar();
    renderFeatured();
    const shops = getFiltered();
    renderList(shops);
  }

  async function loadAndRender() {
    showSkeletons();
    render(); // render from cache immediately

    // Fetch fresh from server
    try {
      const raw = await API.getShops();
      if (raw.length) {
        Store.setServerShops(raw.map(API.normalize));
        render();
      }
    } catch (e) {
      // Stay on cached data — no error shown
    }
  }

  return {
    render, loadAndRender, buildCatBar,
    setCat, toggleNear, toggleOpen,
    onSearch, quickSearch, runSearch,
  };
})();


/* ── discover.js ── */
/**
 * discover.js — Map + bottom sheet discover page
 */
const DiscoverModule = (() => {
  let _map = null;
  let _markers = [];
  let _userMarker = null;
  let _radarLines = [];
  let _shown = [];
  let _sortMode = 'newest';
  let _openOnly = false;
  let _radar = false;
  let _catFilter = '';
  let _sheetOpen = false;

  // ── Map init ──
  function initMap() {
    if (_map) { setTimeout(() => _map.invalidateSize({ pan: false }), 100); return; }

    const container = Utils.el('discoverMap');
    if (!container) return;

    const loc = Store.location;
    const center = loc ? [loc.lat, loc.lng] : [11.1271, 78.6569]; // Tamil Nadu center

    _map = L.map('discoverMap', {
      zoomControl: false,
      scrollWheelZoom: true,
      tap: true,
      tapTolerance: 15,
      attributionControl: false,
      preferCanvas: true,
    }).setView(center, loc ? 14 : 8);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
      maxZoom: 19,
      subdomains: 'abcd',
    }).addTo(_map);

    L.control.zoom({ position: 'bottomleft' }).addTo(_map);

    // Inject popup styles
    if (!document.getElementById('_discPopupStyle')) {
      const s = document.createElement('style');
      s.id = '_discPopupStyle';
      s.textContent = `
        .ds-popup .leaflet-popup-content-wrapper { min-width:190px; }
        .leaflet-control-zoom { margin-left:10px!important; margin-bottom:100px!important; }
      `;
      document.head.appendChild(s);
    }

    [50, 100, 200, 400, 700, 1200, 2000].forEach(t => setTimeout(() => {
      if (_map) {
        _map.invalidateSize({ pan: false, animate: false });
      }
    }, t));
    window.addEventListener('resize', () => setTimeout(() => _map && _map.invalidateSize({ pan: false }), 200), { passive: true });

    // ResizeObserver — fires when container becomes visible
    if (window.ResizeObserver) {
      const ro = new ResizeObserver(() => {
        if (_map) _map.invalidateSize({ pan: false, animate: false });
      });
      ro.observe(container);
    }
  }

  function buildCatBar() {
    const bar = Utils.el('discCatBar');
    if (!bar) return;
    const cats = [
      { id: '',           label: '🌟 All' },
      { id: 'food',       label: '🍛 Food' },
      { id: 'health',     label: '🏥 Health' },
      { id: 'service',    label: '🔧 Services' },
      { id: 'retail',     label: '🛒 Retail' },
      { id: 'beauty',     label: '💇 Beauty' },
      { id: 'education',  label: '🏫 School' },
      { id: 'finance',    label: '🏦 Finance' },
      { id: 'religious',  label: '🛕 Temple' },
    ];
    bar.innerHTML = cats.map(c =>
      `<button class="disc-cat-btn ${_catFilter === c.id ? 'active' : ''}" onclick="DS.discover.setCat('${c.id}',this)">${c.label}</button>`
    ).join('');
  }

  function setCat(cat, el) {
    _catFilter = cat;
    document.querySelectorAll('.disc-cat-btn').forEach(b => b.classList.remove('active'));
    if (el) el.classList.add('active');
    render();
  }

  function toggleOpenNow() {
    _openOnly = !_openOnly;
    const btn = Utils.el('openNowFab');
    if (btn) btn.setAttribute('aria-pressed', _openOnly);
    render();
    Utils.toast(_openOnly ? '🟢 Open now only' : 'Showing all shops');
  }

  function toggleRadar() {
    _radar = !_radar;
    const btn = Utils.el('radarFab');
    if (btn) btn.setAttribute('aria-pressed', _radar);
    if (!_radar) {
      _radarLines.forEach(l => { try { _map.removeLayer(l); } catch {} });
      _radarLines = [];
      Utils.toast('📡 Radar off');
    } else {
      if (!Store.location) { Utils.toast('📍 Set your location first'); _radar = false; if (btn) btn.setAttribute('aria-pressed', 'false'); return; }
      _shown.filter(s => s.lat && s.lng).forEach(drawRadarLine);
      Utils.toast(`📡 Radar — ${_shown.length} shops`);
    }
  }

  function drawRadarLine(s) {
    if (!_map || !Store.location || !s.lat || !s.lng) return;
    const loc = Store.location;
    const color = Utils.sectorColor(s);
    const dist = Utils.km(loc.lat, loc.lng, +s.lat, +s.lng);
    const line = L.polyline([[loc.lat, loc.lng], [+s.lat, +s.lng]], { color, weight: 1.5, dashArray: '5 5', opacity: 0.5 }).addTo(_map);
    const mid = [(loc.lat + (+s.lat)) / 2, (loc.lng + (+s.lng)) / 2];
    const lbl = L.marker(mid, {
      icon: L.divIcon({
        className: '',
        html: `<div style="background:white;border:1.5px solid ${color};border-radius:20px;padding:2px 7px;font-size:10px;font-weight:800;color:${color};white-space:nowrap;box-shadow:var(--shadow-sm)">${Utils.fmtDist(dist)}</div>`,
        iconAnchor: [28, 10],
      }),
      interactive: false,
    }).addTo(_map);
    _radarLines.push(line, lbl);
  }

  function sort(mode, el) {
    _sortMode = mode;
    document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
    if (el) el.classList.add('active');
    render();
  }

  function search(q) {
    Utils.el('discClearBtn').hidden = !q;
    // Debounced render
    clearTimeout(search._t);
    search._t = setTimeout(() => render(q), 250);
  }

  function clearSearch() {
    const inp = Utils.el('discSearchInp');
    if (inp) inp.value = '';
    Utils.el('discClearBtn').hidden = true;
    render('');
  }

  function getFiltered(q = '') {
    let shops = Store.allShops();
    if (q) {
      const lq = q.toLowerCase();
      shops = shops.filter(s =>
        (s.name || '').toLowerCase().includes(lq) ||
        (s.sectorName || '').toLowerCase().includes(lq) ||
        (s.desc || '').toLowerCase().includes(lq) ||
        (s.city || '').toLowerCase().includes(lq)
      );
    }
    if (_catFilter) {
      shops = shops.filter(s => {
        const sec = (s.sector || s.sectorName || s.g || '').toLowerCase();
        return s.g === _catFilter || sec.includes(_catFilter);
      });
    }
    if (_openOnly) shops = shops.filter(s => Utils.isOpen(s));

    const loc = Store.location;
    if (_sortMode === 'newest') shops.sort((a, b) => (b.reg || 0) - (a.reg || 0));
    else if (_sortMode === 'rating') shops.sort((a, b) => (b.rating || 0) - (a.rating || 0));
    else if (_sortMode === 'dist' && loc) {
      shops.sort((a, b) => {
        const da = (a.lat && a.lng) ? Utils.km(loc.lat, loc.lng, +a.lat, +a.lng) : 9999;
        const db = (b.lat && b.lng) ? Utils.km(loc.lat, loc.lng, +b.lat, +b.lng) : 9999;
        return da - db;
      });
    }
    return shops;
  }

  function renderCards() {
    const el = Utils.el('discCards');
    if (!el) return;
    const loc = Store.location;

    if (!_shown.length) {
      el.innerHTML = `
        <div class="empty-state" style="padding:28px 16px">
          <div class="empty-state-icon">🗺️</div>
          <div class="empty-state-title">No shops on map</div>
          <div class="empty-state-sub">Try a different category or <button onclick="DS.nav.go('addshop')" style="color:var(--flame);background:none;border:none;font-size:inherit;font-weight:700;cursor:pointer">add yours</button></div>
        </div>`;
      return;
    }

    el.innerHTML = _shown.map((s, i) => {
      const open = Utils.isOpen(s);
      const dist = loc && s.lat && s.lng ? Utils.km(loc.lat, loc.lng, +s.lat, +s.lng) : null;
      return `
        <div class="disc-card" id="dc-${s.id}" onclick="DS.detail.open('${s.id}')" role="listitem" style="animation-delay:${Math.min(i * 20, 200)}ms">
          <div class="disc-card-thumb">${s.e || s.sectorEmoji || '🏪'}</div>
          <div class="disc-card-info">
            <div class="disc-card-top">
              <span class="disc-card-name">${s.name}</span>
              <span class="disc-card-status ${open ? 'open' : 'closed'}">${open ? '● Open' : '● Closed'}</span>
            </div>
            <div class="disc-card-meta">${s.sectorName || s.sector || ''}${s.city ? ' · ' + s.city : ''}</div>
            <div class="disc-card-foot">
              ${dist !== null ? `<span class="disc-card-dist">📍 ${Utils.fmtDist(dist)}</span>` : ''}
              ${s.rating ? `<span class="disc-card-rating">★ ${s.rating}</span>` : ''}
              <span class="disc-card-price">${Utils.priceLevel(s)}</span>
            </div>
          </div>
        </div>`;
    }).join('');
  }

  function renderMarkers() {
    if (!_map) return;
    _markers.forEach(m => { try { _map.removeLayer(m); } catch {} });
    _markers = [];

    // User location
    if (Store.location) {
      const { lat, lng } = Store.location;
      if (_userMarker) { try { _map.removeLayer(_userMarker); } catch {} }
      _userMarker = L.circleMarker([lat, lng], {
        radius: 10,
        fillColor: '#FF4D00',
        fillOpacity: 1,
        color: 'white',
        weight: 3,
        zIndexOffset: 1000,
      }).addTo(_map).bindPopup('<b style="font-family:DM Sans,sans-serif">📍 You</b>');
      _markers.push(_userMarker);
    }

    const loc = Store.location;
    _shown.filter(s => s.lat && s.lng && !isNaN(+s.lat)).forEach(s => {
      const open  = Utils.isOpen(s);
      const color = open ? Utils.sectorColor(s) : '#9CA3AF';
      const emoji = s.e || s.sectorEmoji || '🏪';
      const dist  = loc ? Utils.km(loc.lat, loc.lng, +s.lat, +s.lng) : null;

      const icon = L.divIcon({
        className: '',
        html: `<div style="background:${color};width:40px;height:40px;border-radius:50%;border:3px solid white;box-shadow:0 3px 10px rgba(0,0,0,.28);display:flex;align-items:center;justify-content:center;font-size:17px">${emoji}</div>`,
        iconSize: [40, 40],
        iconAnchor: [20, 20],
        popupAnchor: [0, -24],
      });

      const m = L.marker([+s.lat, +s.lng], { icon, zIndexOffset: open ? 300 : 100 }).addTo(_map);

      // Build popup as DOM (no quote-escaping issues)
      const popup = document.createElement('div');
      popup.style.fontFamily = 'DM Sans, sans-serif';
      popup.innerHTML = `
        <div style="background:${color};padding:9px 11px;margin:-13px -20px 8px;border-radius:7px 7px 0 0">
          <div style="font-weight:800;color:white;font-size:13px">${s.name}</div>
          <div style="color:rgba(255,255,255,.75);font-size:10px">${s.sectorName || ''}${s.city ? ' · ' + s.city : ''}</div>
        </div>
        <div style="font-size:11px;margin-bottom:8px">
          ${open ? '<span style="color:#0A7C4A;font-weight:700">● Open</span>' : '<span style="color:#C0392B;font-weight:700">● Closed</span>'}
          ${dist !== null ? `<span style="color:#666;margin-left:6px">· ${Utils.fmtDist(dist)}</span>` : ''}
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:5px"></div>`;

      const btnView = document.createElement('button');
      btnView.textContent = 'View Shop';
      btnView.style.cssText = `background:${color};color:white;border:none;border-radius:7px;padding:7px;font-size:11px;font-weight:700;cursor:pointer;width:100%;font-family:DM Sans,sans-serif`;
      btnView.onclick = () => DS.detail.open(s.id);

      const btnDir = document.createElement('button');
      btnDir.textContent = '🧭 Navigate';
      btnDir.style.cssText = `background:#0A7C4A;color:white;border:none;border-radius:7px;padding:7px;font-size:11px;font-weight:700;cursor:pointer;width:100%;font-family:DM Sans,sans-serif`;
      btnDir.onclick = () => DS.detail.navigate(s);

      popup.querySelector('div:last-child').appendChild(btnView);
      popup.querySelector('div:last-child').appendChild(btnDir);

      m.bindPopup(popup, { maxWidth: 220, className: 'ds-popup' });
      m.on('click', () => {
        document.querySelectorAll('.disc-card').forEach(c => c.classList.remove('highlighted'));
        const card = document.getElementById('dc-' + s.id);
        if (card) {
          card.classList.add('highlighted');
          card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
        if (!_sheetOpen) expandSheet();
      });
      _markers.push(m);
    });

    // Fit map
    const hasPts = _shown.filter(s => s.lat && s.lng && !isNaN(+s.lat));
    const allPts = [...(Store.location ? [[Store.location.lat, Store.location.lng]] : []), ...hasPts.map(s => [+s.lat, +s.lng])];
    if (allPts.length > 1) {
      try { _map.fitBounds(L.latLngBounds(allPts), { padding: [80, 60], maxZoom: 16, animate: true }); } catch {}
    } else if (allPts.length === 1) {
      _map.setView(allPts[0], 15, { animate: true });
    }

    // Radar
    if (_radar) {
      _radarLines.forEach(l => { try { _map.removeLayer(l); } catch {} });
      _radarLines = [];
      _shown.filter(s => s.lat && s.lng).forEach(drawRadarLine);
    }
  }

  function fitAll() {
    if (!_map) return;
    const pts = _shown.filter(s => s.lat && s.lng && !isNaN(+s.lat));
    const all = [...(Store.location ? [[Store.location.lat, Store.location.lng]] : []), ...pts.map(s => [+s.lat, +s.lng])];
    if (all.length > 1) { try { _map.fitBounds(L.latLngBounds(all), { padding: [80, 80], maxZoom: 15, animate: true }); } catch {} }
    else if (Store.location) { _map.setView([Store.location.lat, Store.location.lng], 14, { animate: true }); }
    Utils.toast(`🗺️ ${_shown.length} shops`);
  }

  function expandSheet() {
    _sheetOpen = true;
    const sheet = Utils.el('discSheet');
    if (sheet) sheet.classList.add('expanded');
  }

  function collapseSheet() {
    _sheetOpen = false;
    const sheet = Utils.el('discSheet');
    if (sheet) sheet.classList.remove('expanded');
  }

  function setupSheetSwipe() {
    const handle = Utils.el('discHandle');
    const sheet  = Utils.el('discSheet');
    if (!handle || !sheet) return;

    let startY = 0, startT = 0;
    handle.addEventListener('touchstart', e => { startY = e.touches[0].clientY; startT = Date.now(); }, { passive: true });
    handle.addEventListener('touchend', e => {
      const dy = e.changedTouches[0].clientY - startY;
      const dt = Date.now() - startT;
      if (dt < 300) {
        if (dy < -30) expandSheet();
        else if (dy > 30) collapseSheet();
        else _sheetOpen ? collapseSheet() : expandSheet();
      }
    }, { passive: true });

    handle.addEventListener('click', () => _sheetOpen ? collapseSheet() : expandSheet());
  }

  function render(q = Utils.el('discSearchInp')?.value || '') {
    if (!_map) return;
    _shown = getFiltered(q);
    Utils.setText('discCount', `${_shown.length} shop${_shown.length !== 1 ? 's' : ''}`);
    renderCards();
    renderMarkers();
    setTimeout(() => _map && _map.invalidateSize({ pan: false }), 200);
  }

  async function init() {
    initMap();
    buildCatBar();
    setupSheetSwipe();
    render();

    // Auto-detect location
    if (!Store.location && navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        async pos => {
          const geo = await API.reverseGeocode(pos.coords.latitude, pos.coords.longitude);
          DS.location.pick(geo.name, pos.coords.latitude, pos.coords.longitude);
        },
        () => {},
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 60000 }
      );
    }
  }

  return {
    init, render, fitAll,
    setCat, sort, search, clearSearch,
    toggleOpenNow, toggleRadar,
    get _map() { return _map; },
  };
})();

/**
 * detail.js — Shop detail modal
 */
const DetailModule = (() => {
  let _miniMap = null;
  let _current = null;

  function open(id) {
    const shop = Store.allShops().find(s => s.id === id);
    if (!shop) return;
    _current = shop;

    const ov = Utils.el('shopDetailOv');
    if (!ov) return;

    renderHero(shop);
    renderBody(shop);

    ov.hidden = false;
    document.body.style.overflow = 'hidden';
    API.trackEvent(id, 'view');
    history.pushState({ modal: 'detail', shopId: id }, '', '');
  }

  function close() {
    const ov = Utils.el('shopDetailOv');
    if (ov) ov.hidden = true;
    document.body.style.overflow = '';
    if (_miniMap) { try { _miniMap.remove(); } catch {} _miniMap = null; }
    const hero = Utils.el('shopDetailHero');
    if (hero) { hero.querySelectorAll('.hero-emoji').forEach(e => e.remove()); }
    if (history.state?.modal === 'detail') history.back();
  }

  function renderHero(shop) {
    const hero = Utils.el('shopDetailHero');
    const body = Utils.el('shopDetailHeroBody');
    if (!hero || !body) return;

    const color = Utils.sectorColor(shop);
    hero.style.background = `linear-gradient(160deg, ${color}30, ${color}10)`;
    hero.querySelectorAll('.hero-emoji').forEach(e => e.remove());
    const emoEl = document.createElement('span');
    emoEl.className = 'hero-emoji';
    emoEl.style.cssText = 'font-size:72px;z-index:0;opacity:.6';
    emoEl.textContent = shop.e || shop.sectorEmoji || '🏪';
    hero.insertBefore(emoEl, hero.children[0]);

    const ov = document.createElement('div');
    ov.className = 'shop-detail-hero-overlay';
    hero.appendChild(ov);

    const open = Utils.isOpen(shop);
    const loc  = Store.location;
    const dist = loc && shop.lat && shop.lng ? Utils.km(loc.lat, loc.lng, +shop.lat, +shop.lng) : null;

    body.innerHTML = `
      <div class="shop-detail-name">${shop.name}</div>
      <div class="shop-detail-meta">
        <span style="color:${open ? '#4ade80' : '#f87171'};font-weight:700">${open ? '● Open' : '● Closed'}</span>
        ${shop.verified ? '<span style="color:#4ade80">✓ Verified</span>' : ''}
        <span>📍 ${[shop.addr, shop.city].filter(Boolean).join(', ')}</span>
        ${dist !== null ? `<span>${Utils.fmtDist(dist)} away</span>` : ''}
      </div>`;
  }

  function renderBody(shop) {
    const body = Utils.el('shopDetailBody');
    if (!body) return;
    const open = Utils.isOpen(shop);
    const loc  = Store.location;
    const dist = loc && shop.lat && shop.lng ? Utils.km(loc.lat, loc.lng, +shop.lat, +shop.lng) : null;
    const slug  = API.slugify(shop.name);
    const webUrl = shop.websiteUrl || `https://waseem-2007.github.io/deckscrab/?shop=${slug}`;
    const waMsg  = `Hi ${shop.name}! I saw your listing on Deckscrab. I'd like to know more.`;
    const waLink = shop.wa ? Utils.waLink(shop.wa, waMsg) : null;

    body.innerHTML = `
      <!-- Quick info -->
      <div class="quick-strip">
        ${shop.rating ? `<div class="qi">
          <div class="qi-label">Rating</div>
          <div class="qi-value">${Utils.starsHtml(shop.rating)} ${shop.rating}${shop.rc ? ` (${shop.rc})` : ''}</div>
        </div>` : ''}
        ${dist !== null ? `<div class="qi">
          <div class="qi-label">Distance</div>
          <div class="qi-value" style="color:var(--blue)">${Utils.fmtDist(dist)}</div>
        </div>` : ''}
        <div class="qi">
          <div class="qi-label">Price</div>
          <div class="qi-value" style="color:var(--flame)">${Utils.priceLevel(shop)}</div>
        </div>
        <div class="qi">
          <div class="qi-label">Type</div>
          <div class="qi-value" style="font-size:.78rem">${shop.sectorName || shop.sector || ''}</div>
        </div>
        ${shop.delivery ? `<div class="qi">
          <div class="qi-label">Delivery</div>
          <div class="qi-value" style="color:var(--forest)">✓ Yes</div>
        </div>` : ''}
      </div>

      <!-- Action buttons -->
      <div class="action-grid">
        ${waLink ? `<button class="action-btn action-btn--wa" onclick="window.open('${waLink}','_blank')">💬 Order on WhatsApp</button>` : ''}
        ${shop.phone ? `<button class="action-btn action-btn--call" onclick="window.open('tel:${shop.phone}')">📞 Call</button>` : ''}
        <button class="action-btn action-btn--map" onclick="DS.detail.navigate(DS.detail.current)">🧭 Directions</button>
        <button class="action-btn action-btn--share" onclick="Utils.shareShop(DS.detail.current)">🔗 Share</button>
      </div>

      <!-- Description -->
      ${shop.desc ? `<div style="font-family:'Bricolage Grotesque',sans-serif;font-size:.88rem;font-weight:700;color:var(--ink);margin:16px 0 8px">About</div>
      <div style="font-size:.82rem;color:var(--ink-3);line-height:1.75">${shop.desc}</div>` : ''}

      <!-- Menu/products -->
      ${shop.prods && shop.prods.length ? `
        <div style="font-family:'Bricolage Grotesque',sans-serif;font-size:.88rem;font-weight:700;color:var(--ink);margin:16px 0 8px">🛒 Products & Prices</div>
        <div style="background:var(--surface-2);border-radius:var(--radius-md);overflow:hidden;margin-bottom:16px">
          ${shop.prods.map(p => `
            <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 13px;border-bottom:1px solid var(--border)">
              <span style="font-size:.82rem;color:var(--ink)">${p.emoji || ''} ${p.n}</span>
              <span style="font-size:.85rem;font-weight:700;color:var(--flame)">₹${p.p}</span>
            </div>`).join('')}
        </div>` : ''}

      <!-- Website link -->
      <a href="${webUrl}" target="_blank" style="display:flex;align-items:center;gap:9px;background:var(--blue-soft);border:1.5px solid rgba(26,86,219,.2);border-radius:var(--radius-md);padding:11px 13px;text-decoration:none;margin:12px 0">
        <span style="font-size:1.1rem">🌐</span>
        <div style="flex:1;min-width:0">
          <div style="font-size:.76rem;font-weight:700;color:var(--blue)">Order Online</div>
          <div style="font-size:.66rem;color:rgba(26,86,219,.6);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${webUrl}</div>
        </div>
        <span style="font-size:.75rem;color:rgba(26,86,219,.5)">↗</span>
      </a>

      <!-- Mini map -->
      ${shop.lat && shop.lng ? `
        <div style="font-family:'Bricolage Grotesque',sans-serif;font-size:.88rem;font-weight:700;color:var(--ink);margin:16px 0 8px">📍 Location</div>
        <div id="shopMiniMap" style="height:140px;border-radius:var(--radius-md);border:1px solid var(--border);overflow:hidden;margin-bottom:16px"></div>` : ''}

      <!-- Reviews placeholder -->
      <div style="font-family:'Bricolage Grotesque',sans-serif;font-size:.88rem;font-weight:700;color:var(--ink);margin:16px 0 8px">⭐ Reviews</div>
      ${shop.rc ? `<div style="background:var(--surface-2);border-radius:var(--radius-md);padding:12px;font-size:.8rem;color:var(--ink-3)">${shop.rc} review${shop.rc !== 1 ? 's' : ''} · Avg ${shop.rating} ★</div>` :
        `<div style="font-size:.8rem;color:var(--ink-3);padding:12px 0">No reviews yet — be the first!</div>`}
    `;

    // Init mini map
    if (shop.lat && shop.lng) {
      setTimeout(() => initMiniMap(shop), 200);
    }
  }

  function initMiniMap(shop) {
    if (_miniMap) { try { _miniMap.remove(); } catch {} _miniMap = null; }
    const container = document.getElementById('shopMiniMap');
    if (!container || typeof L === 'undefined') return;

    _miniMap = L.map('shopMiniMap', { zoomControl: false, attributionControl: false, dragging: true, scrollWheelZoom: false }).setView([+shop.lat, +shop.lng], 16);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { maxZoom: 20, subdomains: 'abcd' }).addTo(_miniMap);
    L.circleMarker([+shop.lat, +shop.lng], { radius: 12, fillColor: Utils.sectorColor(shop), fillOpacity: 1, color: 'white', weight: 3 }).addTo(_miniMap)
      .bindPopup(`<b>${shop.name}</b>`).openPopup();

    const loc = Store.location;
    if (loc) {
      L.circleMarker([loc.lat, loc.lng], { radius: 7, fillColor: '#FF4D00', fillOpacity: 1, color: 'white', weight: 2 }).addTo(_miniMap);
      L.polyline([[loc.lat, loc.lng], [+shop.lat, +shop.lng]], { color: '#FF4D00', weight: 2, dashArray: '5 5', opacity: 0.5 }).addTo(_miniMap);
      _miniMap.fitBounds([[loc.lat, loc.lng], [+shop.lat, +shop.lng]], { padding: [20, 20] });
    }
  }

  function navigate(shop) {
    if (!shop) return;
    let url;
    if (shop.lat && shop.lng && !isNaN(+shop.lat)) {
      const loc = Store.location;
      url = `https://www.google.com/maps/dir/?api=1&destination=${shop.lat},${shop.lng}&travelmode=driving`;
      if (loc) url += `&origin=${loc.lat},${loc.lng}`;
    } else {
      url = `https://www.google.com/maps/search/${encodeURIComponent(shop.name + ', ' + (shop.city || ''))}`;
    }
    window.open(url, '_blank');
    API.trackEvent(shop.id, 'navigate');
  }

  // Close on Escape
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') close();
  });

  // Close on back button
  window.addEventListener('popstate', e => {
    if (e.state?.modal !== 'detail') close();
  });

  return {
    open, close, navigate,
    get current() { return _current; },
  };
})();

  function initRegMap(lat, lng) {
    // If map exists and has same container, just move it
    const container = document.getElementById('regMapEl');
    if (!container || typeof L === 'undefined') return;
    if (_regMap) {
      _regMap.setView([lat, lng], 18);
      if (_regMarker) _regMarker.setLatLng([lat, lng]);
      setTimeout(() => _regMap && _regMap.invalidateSize(), 100);
      return;
    }
    const el = document.getElementById('regMapEl');
    if (!el || typeof L === 'undefined') return;

    _regMap = L.map('regMapEl', { zoomControl: true, attributionControl: false }).setView([lat, lng], 18);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { maxZoom: 20, subdomains: 'abcd' }).addTo(_regMap);

    _regMarker = L.marker([lat, lng], { draggable: true }).addTo(_regMap);
    _regMarker.on('dragend', e => {
      const p = e.target.getLatLng();
      _shopLat = p.lat;   // ← save to SHOP coords, not user location
      _shopLng = p.lng;
      _pinned = true;
      const coords = `${p.lat.toFixed(6)}, ${p.lng.toFixed(6)}`;
      const el = Utils.el('regMapCoords');
      if (el) el.textContent = `✅ Pinned: ${coords}`;
      const dbg = Utils.el('regLatLngDebug');
      if (dbg) dbg.textContent = `lat: ${p.lat.toFixed(6)}, lng: ${p.lng.toFixed(6)}`;
    });

    _regMap.on('click', e => {
      _shopLat = e.latlng.lat;   // ← save to SHOP coords
      _shopLng = e.latlng.lng;
      _pinned = true;
      if (_regMarker) _regMarker.setLatLng(e.latlng);
      const coords = `${e.latlng.lat.toFixed(6)}, ${e.latlng.lng.toFixed(6)}`;
      const el = Utils.el('regMapCoords');
      if (el) el.textContent = `✅ Pinned: ${coords}`;
      const dbg = Utils.el('regLatLngDebug');
      if (dbg) dbg.textContent = `lat: ${e.latlng.lat.toFixed(6)}, lng: ${e.latlng.lng.toFixed(6)}`;
      Utils.toast('📍 Shop location pinned! Drag pin to fine-tune.');
    });

    if (Store.location?.lat) {
      _pinned = true;
      Utils.el('regMapCoords').textContent = `📍 ${lat.toFixed(5)}, ${lng.toFixed(5)}`;
    }
    setTimeout(() => _regMap?.invalidateSize(), 200);
  }

  async function _regGPS() {
    const ico = Utils.el('regGpsIco');
    const txt = Utils.el('regGpsTxt');
    if (!navigator.geolocation) { Utils.toast('GPS not supported'); return; }
    if (ico) ico.textContent = '⏳';
    if (txt) txt.textContent = 'Getting location…';

    navigator.geolocation.getCurrentPosition(async pos => {
      const { latitude: lat, longitude: lng } = pos.coords;
      _shopLat = lat;   // ← GPS coords go to shop, not user location
      _shopLng = lng;
      _pinned = true;
      if (ico) ico.textContent = '✅';
      if (txt) txt.textContent = `GPS pinned! ${lat.toFixed(5)}, ${lng.toFixed(5)}`;
      const geo = await API.reverseGeocode(lat, lng);
      // Also update user location so map centers correctly
      Store.setLocation(lat, lng, geo.name);
      if (geo.city && !Utils.el('f-ct')?.value) { const el=Utils.el('f-ct'); if(el) el.value = geo.city; }
      if (geo.pincode && !Utils.el('f-pc')?.value) { const el=Utils.el('f-pc'); if(el) el.value = geo.pincode; }
      const coordEl = Utils.el('regMapCoords');
      if (coordEl) coordEl.textContent = `✅ GPS pinned: ${lat.toFixed(6)}, ${lng.toFixed(6)}`;
      const dbg = Utils.el('regLatLngDebug');
      if (dbg) dbg.textContent = `lat: ${lat.toFixed(6)}, lng: ${lng.toFixed(6)}`;
      initRegMap(lat, lng);
      Utils.toast('✅ GPS location pinned to your shop!');
    }, () => {
      if (ico) ico.textContent = '📡';
      if (txt) txt.textContent = 'GPS failed — tap the map to pin';
      Utils.toast('GPS failed — tap map to pin your location');
    }, { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 });
  }

          <a href="${webUrl}" target="_blank" style="flex:1;padding:12px;background:var(--flame);color:white;border-radius:var(--radius-md);font-size:.84rem;font-weight:700;text-decoration:none;display:flex;align-items:center;justify-content:center">🌐 View Shop</a>

        </div>
        <button onclick="window.open('https://wa.me/?text='+encodeURIComponent('Order from ${shop.name}:\\n${webUrl}'),'_blank')" style="width:100%;padding:12px;background:#25D366;color:white;border:none;border-radius:var(--radius-md);font-size:.84rem;font-weight:700;margin-bottom:10px">💬 Share on WhatsApp</button>

      </div>`;
    renderProgress();
  }

  // Navigation
  function next(from) {
    if (from === 0 && !_selSector) { Utils.toast('⚠️ Please select a business category'); return; }
    if (from === 1) {
      if (!Utils.el('f-nm')?.value?.trim()) { Utils.toast('⚠️ Enter your business name'); return; }
      if (!Utils.el('f-ow')?.value?.trim()) { Utils.toast('⚠️ Enter your name'); return; }
    }
    if (from === 2 && !_pinned) { Utils.toast('📍 Pin your location on the map or use GPS'); return; }
    if (from === 3 && !Utils.el('f-ph')?.value?.trim()) { Utils.toast('⚠️ Enter your phone number'); return; }
    if (from === 3) renderStep4();
    _step = from + 1;
    renderCurrentStep();
  }

  function prev() {
    if (_step > 0) { _step--; renderCurrentStep(); }
  }

  return {
    init, next, prev, submit,
    _selectSector, _filterSectors, renderSectors,
    _triggerPhoto, _handlePhoto, _removePhoto,
    _addProd, _regGPS, _addrSearch,
  };
})();

          ${o.custName || o.name ? `<div style="font-size:.76rem;color:var(--ink-2);margin-bottom:4px">👤 ${o.custName||o.name}${(o.custPhone||o.phone) ? '  ·  📞 +91 '+(o.custPhone||o.phone) : ''}</div>` : ''}
          ${o.items?.length ? `<div style="font-size:.72rem;color:var(--ink-3);margin-bottom:6px">${Array.isArray(o.items)?o.items.join(', '):(o.items||'')}</div>` : ''}
          <div style="display:flex;align-items:center;justify-content:space-between">
            <div style="font-family:var(--font-display);font-size:.95rem;font-weight:800;color:var(--flame)">₹${o.total || '—'}</div>
            ${(o.status === 'pending' || o.status === 'new') ? `
              <div style="display:flex;gap:5px">
                <button onclick="DS.profile.updateOrder('${o.id||o.orderId}','confirmed')" style="padding:5px 11px;background:var(--forest);color:white;border:none;border-radius:6px;font-size:.65rem;font-weight:700;cursor:pointer">✅ Confirm</button>
                <button onclick="DS.profile.updateOrder('${o.id||o.orderId}','rejected')" style="padding:5px 11px;background:none;border:1px solid var(--rose);color:var(--rose);border-radius:6px;font-size:.65rem;font-weight:700;cursor:pointer">❌ Reject</button>
              </div>` : ''}
          </div>
        </div>`;
    }).join('');
  }

  // ── Helper: menu item row ─────────────────────────────────────────────────
  function menuItem(icon, label, sub, onclick) {
    return `
      <div class="profile-menu-item" onclick="${onclick}">
        <div class="pmi-left" style="flex-direction:column;align-items:flex-start;gap:1px">
          <span style="display:flex;align-items:center;gap:7px;font-size:.85rem;font-weight:600;color:var(--ink)">${icon} ${label}</span>
          <span style="font-size:.68rem;color:var(--ink-3);padding-left:21px">${sub}</span>
        </div>
        <span class="pmi-arrow">›</span>
      </div>`;
  }

  // ── Auth ──────────────────────────────────────────────────────────────────
  function googleSignIn() {
    if (window._fbAuth) {
      try {
        const provider = new firebase.auth.GoogleAuthProvider();
        window._fbAuth.signInWithPopup(provider)
          .then(r => {
            Store.setUser({ uid:r.user.uid, name:r.user.displayName, email:r.user.email, photo:r.user.photoURL });
            render();
            Utils.toast('✅ Signed in as ' + r.user.displayName);
          })
          .catch(() => Utils.toast('⚠️ Google failed — use phone number instead'));
      } catch { Utils.toast('⚠️ Use phone number instead'); }
    } else {
      Utils.toast('⚠️ Use phone number below');
    }
  }

  function phoneSignIn() {
    const raw   = (Utils.el('phoneSignInInp')?.value || '').replace(/\D/g, '');
    const phone = raw.slice(-10);
    if (phone.length !== 10) { Utils.toast('⚠️ Enter a valid 10-digit number'); return; }
    Store.setUser({ uid:'phone_'+phone, phone, name:'Shop Owner', email:'' });
    render();
    Utils.toast('✅ Signed in with +91 ' + phone);
  }

  function signOut() {
    if (!confirm('Sign out of Deckscrab?')) return;
    Store.clearUser();
    if (window._fbAuth) window._fbAuth.signOut().catch(() => {});
    render();
    Utils.toast('👋 Signed out');
  }

  // ── Shop actions ──────────────────────────────────────────────────────────
  async function syncShops() {
    const shops = Store.myShops();
    if (!shops.length) { Utils.toast('No shops to sync'); return; }
    Utils.toast('☁️ Syncing…');
    let ok = 0;
    for (const s of shops) {
      try { const r = await API.createShop(s); if (r?.ok || r?.id) ok++; } catch {}
    }
    Utils.toast(ok > 0 ? `✅ ${ok} shop${ok>1?'s':''} synced!` : '❌ Sync failed — check connection');
    if (ok > 0) { DS.home.loadAndRender(); render(); }
  }

  async function deleteShop(id) {
    if (!confirm('Delete this listing? This cannot be undone.')) return;
    const shop = Store.myShops().find(s => s.id === id);
    Store.deleteLocalShop(id);
    if (shop?.bizId) try { await API.deleteShop(shop.bizId); } catch {}
    Utils.toast('🗑️ Shop deleted');
    render();
  }

  // ── Order actions ─────────────────────────────────────────────────────────
  function updateOrder(id, status) {
    Store.updateOrder(id, { status });
    Utils.toast(status === 'confirmed' ? '✅ Order confirmed' : '❌ Order rejected');
    render();
  }

  // ── Change PIN modal ──────────────────────────────────────────────────────
  function openPinModal() {
    const modal = Utils.el('pinModalOv');
    if (modal) { modal.style.display = 'flex'; Utils.el('pinCurInp')?.focus(); }
  }

  function closePinModal() {
    const modal = Utils.el('pinModalOv');
    if (modal) modal.style.display = 'none';
    ['pinCurInp','pinNewInp','pinConInp'].forEach(id => { const el = Utils.el(id); if (el) el.value = ''; });
  }

  function savePin() {
    const shops = Store.myShops();
    if (!shops.length) { Utils.toast('⚠️ No shops found'); return; }
    const cur = Utils.el('pinCurInp')?.value || '';
    const np  = Utils.el('pinNewInp')?.value || '';
    const cp  = Utils.el('pinConInp')?.value || '';

    // Check current PIN against each shop's localStorage key
    const slug  = API.slugify(shops[0].name);
    const pfx   = `ds_p_${slug}_`;
    const stored = localStorage.getItem(pfx + 'pin') || '1234';

    if (cur !== stored) { Utils.toast('❌ Current PIN is wrong'); return; }
    if (!/^\d{4}$/.test(np)) { Utils.toast('❌ PIN must be exactly 4 digits'); return; }
    if (np !== cp) { Utils.toast('❌ PINs do not match'); return; }

    // Update PIN for all shops
    shops.forEach(s => {
      const k = `ds_p_${API.slugify(s.name)}_pin`;
      localStorage.setItem(k, np);
    });
    closePinModal();
    Utils.toast('✅ PIN updated for all your shops!');
  }

  return {
    render,
    googleSignIn, phoneSignIn, signOut,
    syncShops, deleteShop,
    updateOrder,
    openPinModal, closePinModal, savePin,
    showShops: render,
    showOrders: render,
    generateQR: () => {},
    downloadQR: () => {},
    generateAllQRs: () => {},
  };
})();

function openPin(){
  if(Date.now()<pinLockUntil){toast('Too many attempts. Wait '+Math.ceil((pinLockUntil-Date.now())/1000)+'s');return;}
  pinBuffer='';updateDots();
  var el=document.getElementById('pinHint');if(el)el.textContent=localStorage.getItem(PREFIX+'firstLogin')?'':'Default PIN: 1234';

}

function pDel(){pinBuffer=pinBuffer.slice(0,-1);updateDots();}
function updateDots(){for(var i=0;i<4;i++){var d=document.getElementById('pd'+i);if(d){d.textContent=i<pinBuffer.length?'●':'—';d.classList.toggle('fill',i<pinBuffer.length);}}}
function checkPin(){
  if(pinBuffer===getPin()){
    document.getElementById('pinScreen').classList.remove('show');
    localStorage.setItem(PREFIX+'firstLogin','1');
    openOwner();pinAttempts=0;
  } else {
    pinAttempts++;
    var err=document.getElementById('pinErr');if(err)err.textContent='Wrong PIN ('+(3-Math.min(pinAttempts,3))+' left)';
    document.querySelectorAll('.pd').forEach(function(d){d.classList.add('shake');setTimeout(function(){d.classList.remove('shake');},400);});
    if(pinAttempts>=3){pinLockUntil=Date.now()+30000;document.getElementById('pinScreen').classList.remove('show');toast('Locked for 30s — too many wrong attempts');pinAttempts=0;}
    pinBuffer='';updateDots();
  }
}

                  <div style="height:72px;background:linear-gradient(135deg,#0f0800,#3d1500);display:flex;align-items:center;justify-content:center;gap:8px;padding:0 10px"><span style="font-size:1.5rem">🍛</span><div><div style="font-size:.7rem;font-weight:800;color:#fff">RESTAURANT</div><div style="font-size:.56rem;color:rgba(255,255,255,.5)">Menu · Cart · Orders</div></div></div>
                  <div style="background:#ff4500;height:3px"></div>
                  <div style="background:#1a0a00;padding:4px;text-align:center;font-size:.6rem;font-weight:700;color:#ff8c00">🔥 Also: Mess · Cafe · Bakery</div>
                </div>
                <div id="tmpl-grocery" onclick="DS.grow.pickTmpl('grocery')" style="border-radius:10px;overflow:hidden;cursor:pointer;border:2.5px solid ${_curTmpl==='grocery'?'#16a34a':'transparent'};transition:.2s">
                  <div style="height:72px;background:linear-gradient(135deg,#071a0e,#14532d);display:flex;align-items:center;justify-content:center;gap:8px;padding:0 10px"><span style="font-size:1.5rem">🛒</span><div><div style="font-size:.7rem;font-weight:800;color:#fff">GROCERY</div><div style="font-size:.56rem;color:rgba(255,255,255,.5)">Products · Cart · Orders</div></div></div>
                  <div style="background:#16a34a;height:3px"></div>
                  <div style="background:#0a1a10;padding:4px;text-align:center;font-size:.6rem;font-weight:700;color:#22c55e">🌿 Also: Kirana · Dairy · Fruits</div>

              </div>
              <div style="font-size:.75rem;font-weight:600;color:#888;margin-bottom:8px">Colour Theme</div>
              <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px">
                ${[['dark','🌙 Classic Dark','linear-gradient(135deg,#1a1a2e,#374151)','#f59e0b'],['warm','🔥 Warm Orange','linear-gradient(135deg,#92400e,#c2410c)','#f97316'],['green','🌿 Fresh Green','linear-gradient(135deg,#14532d,#15803d)','#22c55e']].map(([tid,label,bg,acc])=>`
                  <div id="theme-${tid}" onclick="DS.grow.pickTheme('${tid}')" style="border-radius:10px;overflow:hidden;cursor:pointer;border:2.5px solid ${_curTheme===tid?acc:'transparent'}">
                    <div style="height:56px;background:${bg};display:flex;align-items:center;justify-content:center"><div style="background:${acc};border-radius:99px;padding:3px 10px;font-size:.6rem;font-weight:800;color:#fff">ORDER</div></div>
                    <div style="background:#0a0f1a;padding:4px;text-align:center;font-size:.58rem;font-weight:700;color:#e2e8f0">${label}</div>
                  </div>`).join('')}
              </div>
            </div>
          </div>
          <!-- Live Preview -->
          <div style="background:#1a1200;border:1px solid rgba(255,140,0,.15);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:12px">
            <div style="padding:11px 14px;border-bottom:1px solid rgba(255,140,0,.1);font-size:.84rem;font-weight:700;color:#f5f0e8">👁️ Live Preview</div>
            <div style="background:#1a2232;padding:7px 12px;display:flex;align-items:center;gap:8px">
              <div><span style="width:9px;height:9px;border-radius:50%;background:#ff5f57;display:inline-block"></span><span style="width:9px;height:9px;border-radius:50%;background:#ffbd2e;display:inline-block;margin:0 4px"></span><span style="width:9px;height:9px;border-radius:50%;background:#28ca41;display:inline-block"></span></div>
              <div style="flex:1;background:rgba(255,255,255,.06);border-radius:5px;padding:3px 10px;font-size:.63rem;color:#7dd3fc;font-family:monospace" id="wb-previewUrl">yourshop.deckscrab.in</div>
            </div>
            <iframe id="wb-previewFrame" style="width:100%;height:500px;border:none;display:block;background:#1a1a2e"></iframe>
          </div>
          <div style="display:flex;gap:8px"><button class="btn-back" onclick="DS.grow.builderPrev()">← Back</button><button class="btn-next" onclick="DS.grow.builderNext(2)">Next: Go Live →</button></div>
        </div>
      </div>

      <!-- STEP 3: Go Live -->
      <div id="bs3" style="${_step===3?'':'display:none'}">
        <div style="padding:0 14px 32px">
          <div style="background:#1a1200;border:1px solid rgba(255,140,0,.15);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:12px">
            <div style="padding:11px 14px;border-bottom:1px solid rgba(255,140,0,.1);font-size:.84rem;font-weight:700;color:#f5f0e8">🚀 Step 4 — Go Live!</div>
            <div style="padding:14px">
              <div id="wb-summary" style="background:var(--surface-2);border-radius:var(--radius-md);padding:12px;margin-bottom:14px;font-size:.82rem"></div>
              <div style="background:rgba(31,217,122,.07);border:1.5px solid rgba(31,217,122,.2);border-radius:var(--radius-md);padding:13px;margin-bottom:12px;font-size:.8rem;color:rgba(31,217,122,.9);line-height:1.7">🎉 <strong style="color:var(--ink)">Free during launch!</strong> Your website goes live instantly with full ordering system.</div>
              <button class="btn-next" id="wb-liveBtn" onclick="DS.grow.goLive()">🚀 Create My Website — Free!</button>
              <div id="wb-successBox" style="display:none;margin-top:16px;text-align:center;background:linear-gradient(135deg,rgba(31,217,122,.07),rgba(7,94,84,.12));border:1.5px solid rgba(31,217,122,.25);border-radius:var(--radius-lg);padding:24px 16px">
                <div style="font-size:3rem;margin-bottom:10px">🎉</div>
                <div style="font-family:var(--font-display);font-size:1.3rem;font-weight:800;color:var(--forest);margin-bottom:6px">Website is Live!</div>
                <div style="font-size:.8rem;color:var(--ink-3);margin-bottom:14px">Share this link with your customers</div>
                <div style="background:var(--surface-1);border:1.5px solid var(--border-2);border-radius:var(--radius-md);padding:10px 13px;display:flex;align-items:center;gap:9px;margin-bottom:12px">
                  <span>🌐</span>
                  <span style="color:var(--blue);font-weight:700;font-size:.8rem;flex:1;word-break:break-all" id="wb-liveUrl"></span>
                  <button onclick="navigator.clipboard?.writeText(document.getElementById('wb-liveUrl').textContent).then(()=>Utils.toast('✅ Copied!'))" style="background:rgba(8,145,178,.1);border:1px solid rgba(8,145,178,.25);color:var(--blue);border-radius:8px;padding:5px 10px;font-size:.7rem;font-weight:700;cursor:pointer;white-space:nowrap">Copy</button>
                </div>
                <a id="wb-downloadBtn" download="shop-website.html" style="display:block;width:100%;padding:12px;background:rgba(74,222,128,.12);border:1.5px solid rgba(74,222,128,.28);color:var(--forest);border-radius:var(--radius-md);font-size:.84rem;font-weight:700;cursor:pointer;margin-bottom:8px;text-decoration:none;text-align:center">⬇️ Download Website File</a>
                <button onclick="window.open('https://wa.me/?text='+encodeURIComponent('Order from my shop: '+document.getElementById('wb-liveUrl').textContent),'_blank')" style="width:100%;padding:12px;background:#25D366;color:white;border:none;border-radius:var(--radius-md);font-size:.84rem;font-weight:700;cursor:pointer;margin-bottom:8px">💬 Share on WhatsApp</button>
                <button onclick="DS.nav.go('profile')" style="width:100%;padding:12px;background:var(--surface-2);border:1.5px solid var(--border-2);border-radius:var(--radius-md);font-size:.82rem;font-weight:600;color:var(--ink-2);cursor:pointer">📋 View in Profile →</button>
              </div>
            </div>
          </div>
          <button class="btn-back" onclick="DS.grow.builderPrev()">← Back</button>
        </div>
      </div>`;

    // Init default products on step 1
    if (_step === 1) initDefaultProds(s);
    if (_step === 2) { updatePreview(); }
    if (_step === 3) loadSummary();
  }

  function initDefaultProds(s) {
    _prodCount = 0;
    const list = Utils.el('wb-prodlist');
    if (!list) return;
    list.innerHTML = '';
    const existing = s?.prods || [];
    if (existing.length) {
      existing.forEach(p => addProd(p.emoji||'🍽️', p.n||p.name, p.p||p.price, p.cat||'Menu'));
    } else {
      const cat = Utils.el('wb-cat')?.value || '🍛';
      const isGroc = ['🛒'].includes(cat);
      if (isGroc) {
        addProd('🌾','Rice (1kg)',55,'Grains'); addProd('🛢️','Cooking Oil (1L)',130,'Oils'); addProd('🧂','Salt (1kg)',20,'Essentials'); addProd('🍅','Tomatoes (1kg)',40,'Vegetables');
      } else {
        addProd('🍛','Full Meals',80,'Meals'); addProd('🍲','Sambar Rice',60,'Rice'); addProd('🫓','Chapati (2)',40,'Bread'); addProd('☕','Filter Coffee',20,'Drinks');
      }
    }
  }

  function addProd(emoji='', name='', price='', cat='') {
    _prodCount++;
    const id = _prodCount;
    const list = Utils.el('wb-prodlist');
    if (!list) return;
    const row = document.createElement('div');
    row.id = 'wbpr'+id;
    row.style.cssText = 'display:grid;grid-template-columns:32px 1fr 72px 74px 26px;gap:5px;align-items:center;margin-bottom:6px';
    row.innerHTML = `
      <input id="wbpe${id}" value="${emoji}" placeholder="🍛" style="padding:7px 3px;text-align:center;font-size:.95rem;border:1.5px solid var(--border-2);border-radius:7px;width:100%;background:var(--surface-2);color:var(--ink)"/>
      <input id="wbpn${id}" value="${name}" placeholder="Item name" style="padding:7px 8px;font-size:.78rem;border:1.5px solid var(--border-2);border-radius:7px;width:100%;background:var(--surface-2);color:var(--ink)"/>
      <input id="wbpp${id}" value="${price}" placeholder="Price" type="number" style="padding:7px 8px;font-size:.78rem;border:1.5px solid var(--border-2);border-radius:7px;width:100%;background:var(--surface-2);color:var(--ink)"/>
      <input id="wbpc${id}" value="${cat}" placeholder="Category" style="padding:7px 8px;font-size:.78rem;border:1.5px solid var(--border-2);border-radius:7px;width:100%;background:var(--surface-2);color:var(--ink)"/>
      <button onclick="document.getElementById('wbpr${id}').remove()" style="background:none;border:none;color:var(--ink-4);font-size:1.1rem;cursor:pointer;padding:0;line-height:1">×</button>`;
    list.appendChild(row);
  }

  function getProds() {
    const rows = [];
    document.querySelectorAll('[id^=wbpr]').forEach(row => {
      const id = row.id.slice(4);
      const n = (document.getElementById('wbpn'+id)||{value:''}).value.trim();
      const p = parseFloat((document.getElementById('wbpp'+id)||{value:'0'}).value)||0;
      const e = (document.getElementById('wbpe'+id)||{value:''}).value||'🍽️';
      const c = (document.getElementById('wbpc'+id)||{value:'Menu'}).value||'Menu';
      if (n && p > 0) rows.push({ id:'i'+id, emoji:e, n, p, cat:c, desc:'', veg:true, pop:false, inStock:true });
    });
    return rows;
  }

  function getBiz() {
    const name = (Utils.el('wb-name')?.value||'My Shop').trim();
    const slug = name.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
    return {
      id:slug+'-'+Date.now().toString().slice(-4), bizId:slug, name,
      tagline: (Utils.el('wb-tag')?.value||'Quality service · Best in town').trim(),
      phone:   (Utils.el('wb-phone')?.value||'').replace(/\D/g,'').slice(-10),
      city:    (Utils.el('wb-city')?.value||'').trim(),
      address: (Utils.el('wb-addr')?.value||'').trim(),
      catEmoji: Utils.el('wb-cat')?.value||'🍛',
      openTime: Utils.el('wb-open')?.value||'9:00 AM',
      closeTime: Utils.el('wb-close')?.value||'9:00 PM',
      theme: _curTheme, websiteTemplate: _curTmpl,
      slug, menuItems: getProds(),
    };
  }

  function pickTmpl(t) {
    _curTmpl = t;
    ['restaurant','grocery'].forEach(id => {
      const el = Utils.el('tmpl-'+id);
      if (el) el.style.borderColor = id===t ? (t==='restaurant'?'#ff4500':'#16a34a') : 'transparent';
    });
    updatePreview();
  }

  function pickTheme(t) {
    _curTheme = t;
    const cols = { dark:'#f59e0b', warm:'#f97316', green:'#22c55e' };
    ['dark','warm','green'].forEach(id => {
      const el = Utils.el('theme-'+id);
      if (el) el.style.borderColor = id===t ? cols[id] : 'transparent';
    });
    updatePreview();
  }

  function updatePreview() {
    const biz = getBiz();
    const urlEl = Utils.el('wb-previewUrl');
    if (urlEl) urlEl.textContent = biz.slug+'.deckscrab.in';
    const frame = Utils.el('wb-previewFrame');
    if (frame) frame.srcdoc = buildSiteHtml(biz);
  }

  function loadSummary() {
    const biz = getBiz();
    const el = Utils.el('wb-summary');
    if (!el) return;
    const themes = { dark:'🌙 Classic Dark', warm:'¸ Warm Orange', green:'🌿 Fresh Green' };
    const tmpls = { restaurant:'🍛 Restaurant', grocery:'🛒 Grocery' };
    el.innerHTML = [
      ['Business', biz.name],
      ['Phone', '+91 '+biz.phone],
      ['City', biz.city],
      ['Menu Items', biz.menuItems.length+' items'],
      ['Template', tmpls[_curTmpl]||_curTmpl],
      ['Theme', themes[_curTheme]||_curTheme],
      ['Your URL', `<span style="color:var(--blue)">${biz.slug}.deckscrab.in</span>`],
    ].map(([l,v]) => `<div style="display:flex;justify-content:space-between;font-size:.8rem;padding:6px 0;border-bottom:1px solid var(--border)"><span style="color:var(--ink-3)">${l}</span><strong>${v}</strong></div>`).join('');
  }

  function buildSiteHtml(biz) {
    const isGroc = biz.websiteTemplate === 'grocery';
    const menuJson = JSON.stringify(biz.menuItems||[]);
    const shopJson = JSON.stringify(biz);
    return `<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>${biz.name}</title><style>${REST_CSS}</style></head><body>
${REST_HTML}
<script>
var _DS_PREFIX="ds_p_${biz.slug}_";
var _DS_MENU=${menuJson};
var _DS_BIZ=${shopJson};
var _DS_SHOP_NAME=${JSON.stringify(biz.name)};
var _DS_SHOP_PHONE=${JSON.stringify(biz.phone||'')};
var _DS_SHOP_EMJ=${JSON.stringify(biz.catEmoji||'🏪')};
var _DS_SHOP_TAGLINE=${JSON.stringify(biz.tagline||'')};
var _DS_SHOP_ADDR=${JSON.stringify(biz.address||'')};
var _DS_SHOP_CITY=${JSON.stringify(biz.city||'')};
var _DS_OPEN=${JSON.stringify(biz.openTime||'9:00 AM')};
var _DS_CLOSE=${JSON.stringify(biz.closeTime||'9:00 PM')};
var _DS_THEME=${JSON.stringify(biz.theme||'dark')};
${SITE_JS}
<\/script></body></html>`;
  }

  async function goLive() {
    const biz = getBiz();
    if (!biz.name||!biz.phone||!biz.city) { Utils.toast('⚠️ Fill name, phone and city'); return; }
    const btn = Utils.el('wb-liveBtn');
    if (btn) { btn.disabled=true; btn.textContent='Creating…'; }

    const websiteHtml = buildSiteHtml(biz);
    const slug = biz.slug;
    const websiteUrl = `https://waseem-2007.github.io/deckscrab/?shop=${slug}`;

    // Save to local shop
    const existingShop = Store.myShops().find(s => API.slugify(s.name)===slug || s.name===biz.name);
    const shopData = {
      ...(existingShop||{}), id: existingShop?.id || Utils.uid('my'),
      name:biz.name, desc:biz.tagline, phone:biz.phone, wa:biz.phone,
      city:biz.city, addr:biz.address, sectorName:biz.catEmoji,
      sectorEmoji:biz.catEmoji, e:biz.catEmoji, g:'retail',
      prods:biz.menuItems, websiteTemplate:_curTmpl, websiteEnabled:true,
      websiteUrl, customHtml:websiteHtml, reg:Date.now(),
      oh:'09:00', oc:'21:00',
    };
    Store.addLocalShop(shopData);

    // Try server
    try { await API.createShop(shopData); } catch {}

    // WhatsApp notify
    const msg = encodeURIComponent(`🏪 New website built!\n\n${biz.name}\n📍 ${biz.city}\n📞 ${biz.phone}\n\n🌐 ${websiteUrl}`);
    setTimeout(() => window.open(`https://wa.me/919384707706?text=${msg}`,'_blank'), 1500);

    // Download link
    const blob = new Blob([websiteHtml],{type:'text/html'});
    const dlUrl = URL.createObjectURL(blob);
    const dlBtn = Utils.el('wb-downloadBtn');
    if (dlBtn) { dlBtn.href=dlUrl; dlBtn.download=slug+'-website.html'; }

    Utils.el('wb-liveUrl').textContent = websiteUrl;
    Utils.el('wb-successBox').style.display = 'block';
    if (btn) btn.style.display = 'none';
    Utils.toast('🎉 Website created!');
  }

  function builderNext(fromStep) {
    if (fromStep===0) {
      if (!(Utils.el('wb-name')?.value||'').trim()) { Utils.toast('⚠️ Enter business name'); return; }
      if ((Utils.el('wb-phone')?.value||'').replace(/\D/g,'').length<10) { Utils.toast('⚠️ Enter valid phone'); return; }
      if (!(Utils.el('wb-city')?.value||'').trim()) { Utils.toast('⚠️ Enter city'); return; }
    }
    _step = fromStep + 1;
    const c = Utils.el('growContent');
    if (!c) return;
    const biz = getBiz();
    renderBuilderPage({ ...biz, prods:getProds() });
    window.scrollTo(0,0);
  }

  function builderPrev() {
    if (_step > 0) { _step--; const biz=getBiz(); renderBuilderPage({...biz,prods:getProds()}); window.scrollTo(0,0); }
    else render();
  }

  return { render, openBuilder, editSite, addProd, pickTmpl, pickTheme, builderNext, builderPrev, goLive };
})();

/**

const NavModule = (() => {
  const PAGES = ['home', 'discover', 'addshop', 'grow', 'profile'];
  let _current = 'home';

  function go(page, pushState = true) {
    if (!PAGES.includes(page)) page = 'home';

    // Update browser history
    if (pushState) {
      try {
        const url = `?page=${page}`;
        if (history.state?.page !== page) history.pushState({ page }, '', url);
        else history.replaceState({ page }, '', url);
      } catch {}
    }

    // Deactivate all pages + nav buttons
    PAGES.forEach(p => {
      document.getElementById('page-' + p)?.classList.remove('active');
      const btn = document.getElementById('bnav-' + p);
      if (btn) { btn.classList.remove('active'); btn.removeAttribute('aria-current'); }
    });

    // Activate target
    document.getElementById('page-' + page)?.classList.add('active');
    const navBtn = document.getElementById('bnav-' + page);
    if (navBtn) { navBtn.classList.add('active'); navBtn.setAttribute('aria-current', 'page'); }

    _current = page;

    // Page-specific init
    switch (page) {
      case 'home':     DS.home.loadAndRender();   break;
      case 'discover':
        DS.discover.init();
        // Force map resize after page becomes visible
        [100, 300, 600, 1000].forEach(t => setTimeout(() => {
          if (DS.discover._map) DS.discover._map.invalidateSize({ pan: false, animate: false });
        }, t));
        break;
      case 'addshop':  DS.addshop.init();          break;
      case 'grow':     DS.grow.render();           break;
      case 'profile':  DS.profile.render();        break;
    }

    window.scrollTo({ top: 0, behavior: 'instant' });
  }

  function init() {
    // Back/forward navigation
    window.addEventListener('popstate', e => {
      const page = e.state?.page || 'home';
      go(page, false);
    });

    // Read initial page from URL
    const params = new URLSearchParams(location.search);
    const initPage = params.get('page') || 'home';
    try { history.replaceState({ page: initPage }, '', '?page=' + initPage); } catch {}
    go(initPage, false);
  }

  return {
    go, init,
    get current() { return _current; },
  };
})();

// Pull-to-refresh
let _pty = 0;
document.addEventListener('touchstart', e => { if (window.scrollY===0) _pty = e.touches[0].clientY; }, { passive:true });
document.addEventListener('touchend',   e => {
  if (_pty > 0 && (e.changedTouches[0].clientY - _pty) > 72) {
    if (DS.nav.current === 'home')     { DS.home.loadAndRender(); Utils.toast('🔄 Refreshed'); }

}, { passive:true });
